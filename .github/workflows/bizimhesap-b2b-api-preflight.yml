name: BizimHesap B2B API Preflight

on:
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BIZIMHESAP_B2B_TOKEN: ${{ secrets.BIZIMHESAP_B2B_TOKEN }}
      BIZIMHESAP_FIRM_ID: ${{ secrets.BIZIMHESAP_FIRM_ID }}
      BIZIMHESAP_B2B_API_LIVE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Check BizimHesap B2B API read access
        run: npm run verify:bizimhesap:b2b-api:live
