name: Hourly BizimHesap Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hourly-bizimhesap-sync.yml"
      - "aperion_veri_senkron.js"
      - "bizimhesap_common.cjs"
      - "bizimhesap_bot.js"
      - "bizimhesap_son_islemler_izle.js"
      - "bizimhesap_masraf_cek.js"
      - "bizimhesap_urun_stok_cek.js"
      - "tools/check_bizimhesap_action_secrets.cjs"
      - "tools/stress_check_index_sales_today.cjs"
      - "package.json"
      - "package-lock.json"
  schedule:
    # Hourly BizimHesap source sync.
    - cron: '7 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Check BizimHesap secrets
        env:
          BIZIMHESAP_EMAIL: ${{ secrets.BIZIMHESAP_EMAIL }}
          BIZIMHESAP_PASSWORD: ${{ secrets.BIZIMHESAP_PASSWORD }}
        run: npm run verify:bizimhesap:secrets
      - name: Pull latest BizimHesap data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BIZIMHESAP_EMAIL: ${{ secrets.BIZIMHESAP_EMAIL }}
          BIZIMHESAP_PASSWORD: ${{ secrets.BIZIMHESAP_PASSWORD }}
          BIZIMHESAP_HEADLESS: "true"
        run: npm run sync:bizimhesap -- --firma alayli
      - name: Verify sales today screen source
        run: node tools/stress_check_index_sales_today.cjs
