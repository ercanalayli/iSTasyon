name: Inject AperiON Finance Link

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/inject_finance_into_index.cjs'
      - 'scripts/verify_finance_index_link.cjs'
      - 'package.json'
      - '.github/workflows/finance-inject-index.yml'

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject finance link into index
        run: npm run finance-inject-index
      - name: Verify finance link in index
        run: npm run finance-verify-index
      - name: Show diff
        run: git diff -- index.html
      - name: Commit index update
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Inject AperiON finance calendar link into index"
          git push
