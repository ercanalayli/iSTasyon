name: AperiON Finance Product Profit Test

on:
  push:
    paths:
      - 'finance/**'
      - '.github/workflows/finance-product-profit-test.yml'
  workflow_dispatch:

jobs:
  product-profit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run product profit test
        working-directory: finance
        run: npm run test:product-profit
