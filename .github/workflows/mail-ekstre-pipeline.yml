name: AperiON Mail Ekstre Pipeline

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Ekstre kaynagi"
        type: choice
        options:
          - gmail
          - drive
        default: gmail
      live:
        description: "Dry-run basariliysa pending_bank_movements tablosuna canli yaz"
        type: boolean
        default: true
  schedule:
    - cron: "*/15 5-17 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mail-ekstre-pipeline.yml"
      - "automation/**"
      - "tools/mail_ekstre_actions_check.cjs"
      - "package.json"

jobs:
  mail-ekstre:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GDRIVE_EKSTRE_FOLDER_ID: ${{ secrets.GDRIVE_EKSTRE_FOLDER_ID }}
      EKSTRE_SOURCE: ${{ inputs.source || 'gmail' }}
      GMAIL_MAILBOX: alaylimedikal@gmail.com
      LOOKBACK_DAYS: "45"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Enforce mailbox
        run: |
          node -e "const cfg=require('./automation/mail-ekstre-config.json'); if(cfg.mailbox!=='alaylimedikal@gmail.com'){throw new Error('Wrong mailbox: '+cfg.mailbox)}; console.log('MAILBOX_OK='+cfg.mailbox)"

      - name: Check secrets and Supabase SQL objects
        id: sqlcheck
        run: |
          set +e
          node tools/mail_ekstre_actions_check.cjs | tee mail-ekstre-sql-check.txt
          if grep -q "MAIL_SQL_READY=1" mail-ekstre-sql-check.txt; then
            echo "sql_ready=1" >> "$GITHUB_OUTPUT"
          else
            echo "sql_ready=0" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Mail ekstre preflight
        run: |
          set -o pipefail
          npm run mail:ekstre:preflight | tee mail-ekstre-preflight.txt

      - name: Ekstre dry-run
        id: dryrun
        continue-on-error: true
        working-directory: automation
        env:
          DRY_RUN: "1"
        run: |
          set -o pipefail
          node mail-ekstre-worker-lite.js | tee ../mail-ekstre-dry-run.txt

      - name: Report dry-run parsed rows
        id: dryrun_report
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const files = fs.existsSync('automation/logs') ? fs.readdirSync('automation/logs').filter(f=>f.startsWith('ekstre-')).sort() : [];
          const last = files.at(-1);
          if (!last) {
            console.log('DRY_RUN_REPORT=missing');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'parsed_rows=0\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync('automation/logs/'+last,'utf8'));
          console.log('DRY_RUN_REPORT_FILE='+last);
          console.log('DRY_RUN_SOURCE='+report.source);
          console.log('DRY_RUN_PARSED_ROWS='+report.parsed_rows);
          console.log('DRY_RUN_ATTACHMENTS='+report.attachments);
          console.log('DRY_RUN_READABLE_ATTACHMENTS='+report.readable_attachments);
          console.log('DRY_RUN_ERRORS='+report.errors.length);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `parsed_rows=${Number(report.parsed_rows || 0)}\n`);
          fs.writeFileSync('mail-ekstre-dry-run-summary.json', JSON.stringify(report,null,2));
          NODE

      - name: Live ingest to pending_bank_movements
        if: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || inputs.live == true) && steps.sqlcheck.outputs.sql_ready == '1' && steps.dryrun.outcome == 'success' && steps.dryrun_report.outputs.parsed_rows != '0' }}
        working-directory: automation
        env:
          DRY_RUN: "0"
        run: |
          set -o pipefail
          node mail-ekstre-worker-lite.js | tee ../mail-ekstre-live-run.txt

      - name: Check approval center rows
        if: always()
        continue-on-error: true
        run: |
          node - <<'NODE'
          const { createClient } = require('@supabase/supabase-js');
          const db = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY, { auth:{persistSession:false} });
          (async()=>{
            for (const table of ['pending_bank_movements','bizimhesap_queue']) {
              const {data,error,count}=await db.from(table).select('*',{count:'exact'}).eq('company_id','alayli').limit(10);
              console.log(`${error?'ERR':'OK'} ${table}: ${error?error.message:count+' rows / sample '+(data?.length||0)}`);
            }
          })().catch(e=>{console.error(e.message); process.exitCode=1});
          NODE

      - name: Upload mail ekstre reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mail-ekstre-reports
          path: |
            mail-ekstre-*.txt
            mail-ekstre-*.json
            automation/logs/*.json
            automation/logs/*.txt
          if-no-files-found: ignore
