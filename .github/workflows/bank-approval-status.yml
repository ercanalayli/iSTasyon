name: AperiON Bank Approval Status

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "AperiON Mail Ekstre Pipeline"
      - "AperiON BizimHesap Queue Worker"
    types: [completed]
  schedule:
    # 10:12 and 17:12 Europe/Istanbul, after fixed mail ekstre checks.
    - cron: "12 7,14 * * *"
    # Daytime read-only refresh for the live command center.
    - cron: "*/30 8-17 * * *"
  push:
    branches: [ main ]
    paths:
      - ".github/workflows/bank-approval-status.yml"
      - "tools/build_bank_approval_status_v76.cjs"
      - "tools/merge_bank_approval_status_v82.cjs"
      - "tools/build_bizimhesap_simulation_v116.cjs"
      - "tools/attach_bizimhesap_simulation_to_approval_v117.cjs"
      - "tools/verify_bizimhesap_simulation_v116.cjs"
      - "tools/verify_bizimhesap_approval_center_v117.cjs"
      - "tools/approve_bank_candidate_v70.cjs"
      - "tools/check_bank_candidate_queue_proof_v71.cjs"
      - "tools/select_bank_approval_candidate_v69.cjs"
      - "tools/verify_bank_candidate_pilot_scope_v83.cjs"
      - "tools/preview_pending_bank_to_bizimhesap_plan.cjs"
      - "tools/bank_posting_plan.cjs"
      - "tools/build_daily_bank_review_v89.cjs"
      - "gunluk-banka-karar.html"
      - "bizimhesap_queue_worker.cjs"
      - "package.json"

permissions:
  contents: write

concurrency:
  group: aperion-bank-approval-status
  cancel-in-progress: true

jobs:
  bank-approval-status:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COMPANY_ID: alayli
      BANK_APPROVAL_PILOT_BANK: IS BANKASI
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify bank approval guards
        run: |
          npm run verify:bank-candidate-guard
          npm run verify:bank-approval-action
          npm run verify:bank-candidate-pilot-scope

      - name: Build read-only bank approval status
        run: npm run bank:approval:status

      - name: Build unified bank approval status
        run: npm run bank:approval:unified-status

      - name: Build and attach BizimHesap simulation
        run: |
          node tools/verify_bizimhesap_simulation_v116.cjs
          node tools/verify_bizimhesap_approval_center_v117.cjs
          if [ -f data/bizimhesap_queue_dryrun.json ]; then
            node tools/build_bizimhesap_simulation_v116.cjs
          fi
          node tools/attach_bizimhesap_simulation_to_approval_v117.cjs

      - name: Build latest daily bank review
        run: npm run bank:daily-review

      - name: Commit status snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/aperion_bank_approval_status.json data/aperion_bank_approval_unified_status.json data/aperion_daily_bank_review.json data/bizimhesap_simulation.json
          if git diff --cached --quiet; then
            echo "No bank approval status change"
          else
            git commit -m "Update bank approval status snapshots"
            git push
          fi

      - name: Upload status diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bank-approval-status
          if-no-files-found: ignore
          path: |
            data/aperion_bank_approval_status.json
            data/aperion_bank_approval_unified_status.json
            data/aperion_daily_bank_review.json
            data/banka_onay_aday_kanit_durumu.json
            data/banka_onay_guvenli_adaylar.json
            data/banka_onay_kuyruk_kaniti.json
            data/bizimhesap_queue_dryrun.json
            data/bizimhesap_simulation.json
            data/banka_onay_bizimhesap_kayit_plani.json
