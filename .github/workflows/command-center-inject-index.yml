name: Inject AperiON Finance Command Center Link

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject command center link into index
        run: npm run command-center-inject-index
      - name: Verify command center link in index
        run: npm run command-center-verify-index
      - name: Show diff
        run: git diff -- index.html
      - name: Commit index update
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Inject AperiON finance command center link into index"
          git push
