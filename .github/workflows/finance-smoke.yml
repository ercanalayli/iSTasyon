name: AperiON Finance Smoke Test

on:
  push:
    paths:
      - 'aperion-finans-takvimi-live.html'
      - 'finance_*.js'
      - 'finance_*.cjs'
      - 'bizimhesap_finance_pipeline.cjs'
      - 'moka_*.js'
      - 'moka_*.cjs'
      - 'sales_dashboard_adapter.js'
      - 'turkiye_business_calendar.js'
      - 'supabase_finans_*.sql'
      - 'SUPABASE_FINANCE_INSTALL_ALL.sql'
      - 'data/sales_report_summary_2025_2026.json'
      - 'test_data/**'
      - 'package.json'
      - '.github/workflows/finance-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run finance smoke test
        run: npm run finance-smoke
