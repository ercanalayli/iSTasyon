<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AperiON — Giriş</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07080d;--s1:#0e0f18;--s2:#141520;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--accent:#00e5ff;--green:#00ff88;--danger:#ff4d6d;--text:#dde1f0;--muted:#5a5f7a;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,229,255,.06),transparent),
  linear-gradient(rgba(0,229,255,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,229,255,.02) 1px,transparent 1px);
  background-size:100%,48px 48px,48px 48px}

.login-wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:24px}

/* Logo */
.logo{text-align:center;margin-bottom:40px}
.logo-main{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--accent);letter-spacing:4px;display:block;margin-bottom:6px}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:3px}
.logo-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:12px auto}

/* Kart */
.card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}

.card-title{font-size:18px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px}
.card-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:28px;letter-spacing:1px}

/* Form */
.field{margin-bottom:16px}
.field-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.field-input{
  width:100%;padding:12px 14px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);
  font-family:var(--mono);font-size:13px;outline:none;
  transition:border-color .2s
}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--muted)}

/* Buton */
.btn-login{
  width:100%;padding:13px;border-radius:8px;border:none;
  background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(0,255,136,.15));
  border:1px solid rgba(0,229,255,.3);
  color:var(--accent);font-family:var(--mono);font-size:12px;
  font-weight:700;letter-spacing:2px;cursor:pointer;
  transition:all .2s;margin-top:8px
}
.btn-login:hover{background:linear-gradient(135deg,rgba(0,229,255,.32),rgba(0,255,136,.25));transform:translateY(-1px)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Hata */
.err-box{
  background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.25);
  border-radius:6px;padding:10px 14px;
  font-family:var(--mono);font-size:11px;color:var(--danger);
  margin-top:14px;display:none
}
.err-box.show{display:block}

/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,229,255,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* Firma rozeti */
.firma-badge{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;background:var(--s2);border:1px solid var(--border);
  border-radius:6px;margin-bottom:20px;font-size:12px
}
.firma-badge-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.firma-badge-txt{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* Footer */
.footer{text-align:center;margin-top:24px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <span class="logo-main">AperiON</span>
    <div class="logo-line"></div>
    <span class="logo-sub">ERPALH · iSTasyon · Veri İstihbaratı</span>
  </div>

  <div class="card">
    <div class="card-title">Hoş Geldiniz</div>
    <div class="card-sub">HESABINIZLA GİRİŞ YAPIN</div>

    <div class="field">
      <div class="field-lbl">E-posta</div>
      <input class="field-input" id="email" type="email" placeholder="firma@aperion.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-lbl">Şifre</div>
      <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">
      <span class="spinner" id="spinner"></span>
      GİRİŞ YAP
    </button>

    <div class="err-box" id="errBox"></div>
  </div>

  <div class="footer">© 2026 AperiON · ErpaltH iSTasyon · Tüm hakları saklıdır</div>
</div>

<script>
const SURL='https://iilfwosoroflzubkaryj.supabase.co';
const SKEY='sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW';
const db=supabase.createClient(SURL,SKEY);

// Enter ile login
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});

// Zaten giriş yapılmış mı kontrol et
window.addEventListener('load',async()=>{
  const{data:{session}}=await db.auth.getSession();
  if(session) window.location.href='index.html';
});

async function login(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const btn=document.getElementById('btnLogin');
  const err=document.getElementById('errBox');
  const spin=document.getElementById('spinner');

  if(!email||!pass){showErr('E-posta ve şifre gerekli!');return;}

  btn.disabled=true;
  spin.style.display='inline-block';
  err.classList.remove('show');

  const{data,error}=await db.auth.signInWithPassword({email,password:pass});

  if(error){
    btn.disabled=false;
    spin.style.display='none';
    showErr(error.message==='Invalid login credentials'?'Hatalı e-posta veya şifre!':error.message);
    return;
  }

  // Kullanıcı bilgisini al
  const{data:uData}=await db.from('aperion_users').select('*').eq('user_id',data.user.id).single();
  if(uData){
    localStorage.setItem('aperion_user',JSON.stringify(uData));
  }

  window.location.href='index.html';
}

function showErr(msg){
  const e=document.getElementById('errBox');
  e.textContent='⚠ '+msg;
  e.classList.add('show');
}
</script>
</body>
</html>
