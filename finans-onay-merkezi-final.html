<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Akıllı Onay Merkezi</title><style>body{margin:0;background:#f4f6fa;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;padding:14px}.top{background:#ea580c;color:white;border-radius:14px;padding:13px;text-align:center;font-weight:900}.upd{margin:10px 0;background:#ecfdf3;color:#047857;border:1px solid #bbf7d0;border-radius:12px;padding:10px;text-align:center;font-size:12px;font-weight:900}.note{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;border-radius:12px;padding:11px;font-size:12px;font-weight:800;line-height:1.4}.card,.item{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:13px;margin-top:12px;box-shadow:0 6px 18px rgba(15,23,42,.05)}.title{font-weight:900;margin-bottom:8px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;text-align:center;padding:9px}.n{font-size:20px;font-weight:900}.l{font-size:10px;color:#64748b;font-weight:800}.item{border-left:4px solid #f59e0b}.head{display:flex;justify-content:space-between;color:#64748b;font-size:11px;font-weight:800}.desc{font-size:13px;font-weight:900;margin:8px 0}.amt{font-size:17px;font-weight:900}.out{color:#dc2626}.in{color:#047857}.meta{background:#f8fafc;border-radius:10px;padding:8px;font-size:11px;line-height:1.55;color:#334155}.score{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:4px 8px;font-weight:900;font-size:11px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}button{border:0;border-radius:9px;padding:10px;color:white;font-weight:900}.ok{background:#10b981}.edit{background:#2563eb}.wait{background:#64748b}.reject{background:#ef4444}.save{background:#0f766e}.ledger{background:#0f172a;color:#bbf7d0;border-radius:12px;padding:10px;font-family:monospace;font-size:11px;white-space:pre-wrap;min-height:60px}.editbox{margin-top:9px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:9px}label{font-size:11px;color:#64748b;font-weight:900;display:block;margin:7px 0 4px}input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:9px;font-size:14px}</style></head><body><div class="top">Mailden Banka Hareketi ve Akıllı Onay Merkezi</div><div class="upd">Güncellendi: 01.06.2026 01:42 · Düzelt ve Onayla aktif</div><div class="note">Mailden yükle butonu yok. Hareketler otomatik onaya gelir. Düzelt ve Onayla artık kart içinde düzenleme alanı açar.</div><div class="card"><div class="title">Mail Sinyali</div><div class="grid"><div class="box"><div class="n">10</div><div class="l">OKUNAN</div></div><div class="box"><div class="n" id="newCount">5</div><div class="l">YENİ</div></div><div class="box"><div class="n">0</div><div class="l">MÜKERRER</div></div></div></div><div class="card"><div class="title">Onay Bekleyenler</div><div id="list"></div></div><div class="card"><div class="title">Onaylananlar</div><div class="ledger" id="ledger">Bekliyor...</div></div><script>const rows=[['26052026092753-01','26/05/2026 09:27:53','BSMV EFT Ücreti',-0.80,'Banka masrafı','Banka Masrafları','Yapı Kredi Bankası',95,'Açıklamada BSMV ve EFT ücreti geçti.'],['26052026092753-02','26/05/2026 09:27:53','EFT Ücreti',-15.96,'Banka masrafı','Banka Masrafları','Yapı Kredi Bankası',95,'Açıklamada EFT ücreti geçti.'],['26052026092753-03','26/05/2026 09:27:53','Giden FAST Akbank virman',-36000,'Virman','Virman / Bankalar Arası Aktarım','Akbank hesabı',75,'Açıklamada virman ve banka adı geçti. Karşı hesap kontrol edilmeli.'],['26052026041728-04','26/05/2026 04:17:28','Peşin satış',340,'POS tahsilatı','POS Tahsilatları','Yapı Kredi POS',85,'Açıklamada peşin satış geçti.'],['22052026154901-01','22/05/2026 15:49:01','Gelen EFT KTS',30000,'Tahsilat','Cari Tahsilatları','KTS Kabelbaum Test Sistem',65,'Gelen EFT algılandı. Cari eşleşmesi netleşmeli.']];let pending=rows.map(r=>({id:r[0],dt:r[1],d:r[2],a:r[3],type:r[4],place:r[5],cari:r[6],score:r[7],why:r[8],editing:false})),approved=[];function tl(x){return '₺'+Number(x).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})}function render(){newCount.textContent=pending.length;list.innerHTML=pending.map(r=>`<div class="item"><div class="head"><span>${r.dt}</span><span>${r.id}</span></div><div class="desc">${r.d}</div><div class="amt ${r.a<0?'out':'in'}">${tl(r.a)}</div><div class="meta">Hareket tipi: <b>${r.type}</b><br>Gider/Gelir yeri: <b>${r.place}</b><br>Cari/Karşı taraf: <b>${r.cari}</b><br>Güven: <span class="score">${r.score}</span><br>Sebep: ${r.why}<br>Durum: ${r.score>=80?'Onay bekliyor':'Needs review'}</div>${r.editing?editBox(r):buttons(r)}</div>`).join('')||'<div class="meta">Onay bekleyen hareket yok.</div>'}function buttons(r){return `<div class="actions"><button class="ok" onclick="approve('${r.id}')">Öneriyi Onayla</button><button class="edit" onclick="openEdit('${r.id}')">Düzelt ve Onayla</button><button class="wait" onclick="hold('${r.id}')">Beklet</button><button class="reject" onclick="removeRow('${r.id}')">Reddet</button></div>`}function editBox(r){return `<div class="editbox"><label>Hareket tipi</label><input id="type_${r.id}" value="${r.type}"><label>Gider/Gelir yeri</label><input id="place_${r.id}" value="${r.place}"><label>Cari/Karşı taraf</label><input id="cari_${r.id}" value="${r.cari}"><div class="actions"><button class="save" onclick="saveEdit('${r.id}')">Kaydet ve Onayla</button><button class="wait" onclick="cancelEdit('${r.id}')">Vazgeç</button></div></div>`}function find(id){return pending.find(x=>x.id===id)}function openEdit(id){find(id).editing=true;render()}function cancelEdit(id){find(id).editing=false;render()}function saveEdit(id){const r=find(id);r.type=document.getElementById('type_'+id).value;r.place=document.getElementById('place_'+id).value;r.cari=document.getElementById('cari_'+id).value;r.why='Kullanıcı tarafından düzeltildi ve onaylandı.';approve(id)}function approve(id){const i=pending.findIndex(r=>r.id===id);if(i<0)return;const r=pending.splice(i,1)[0];approved.push(r);ledger.textContent=approved.map(x=>`ONAYLANDI ${x.dt} ${tl(x.a)} ${x.d} | ${x.type} | ${x.place} | ${x.cari} | ${x.id}`).join('\n');render()}function removeRow(id){pending=pending.filter(r=>r.id!==id);render()}function hold(id){const r=find(id);r.why='Bekletildi. Sonra tekrar incelenecek.';r.score=50;render()}render();</script></body></html>
