<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>iSTasyon В· Rapor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080B0F;--s1:#0E1318;--s2:#131A22;--s3:#1A2330;
  --bd:rgba(100,180,255,0.07);--bd2:rgba(100,180,255,0.14);
  --tx:#E8F0F8;--tx2:#8AA4BF;--tx3:#445566;
  --ac:#3B82F6;--acl:rgba(59,130,246,0.12);
  --g:#10B981;--gl:rgba(16,185,129,0.1);
  --r:#EF4444;--a:#F59E0B;--p:#8B5CF6;
  --rad:14px;
  --safe:env(safe-area-inset-top,20px);
  --safeb:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:440px;margin:0 auto}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,130,246,0.06),transparent);}

/* HEADER */
.hdr{padding:calc(var(--safe)+10px) 18px 12px;flex-shrink:0;position:relative;z-index:10;
  background:rgba(8,11,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.hdr-row{display:flex;align-items:center;gap:12px}
.hdr-back{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);
  display:grid;place-items:center;font-size:16px;cursor:pointer;flex-shrink:0;
  transition:all .15s;text-decoration:none;color:var(--tx);}
.hdr-back:active{transform:scale(.92)}
.hdr-title{font-size:15px;font-weight:800}
.hdr-sub{font-size:9px;color:var(--tx3);font-family:'DM Mono',monospace;letter-spacing:.1em;margin-top:1px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 24px;
  -webkit-overflow-scrolling:touch;position:relative;z-index:1}
.scroll::-webkit-scrollbar{display:none}

/* BГ–LГњM BAЕћLIДћI */
.bolum{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.15em;margin:16px 0 8px 2px}
.bolum:first-child{margin-top:0}

/* FД°RMA SEГ‡ */
.firma-secici{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.firma-radio{
  display:flex;align-items:center;gap:12px;
  background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--rad);
  padding:12px 14px;cursor:pointer;transition:all .2s;
}
.firma-radio.secili{border-color:var(--ac);background:var(--acl)}
.firma-radio:active{transform:scale(.98)}
.fr-ikon{font-size:20px;flex-shrink:0}
.fr-bilgi{flex:1}
.fr-ad{font-size:13px;font-weight:700}
.fr-alt{font-size:10px;color:var(--tx3);margin-top:2px}
.fr-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd2);
  flex-shrink:0;display:grid;place-items:center;font-size:10px;transition:all .2s}
.firma-radio.secili .fr-check{background:var(--ac);border-color:var(--ac)}

/* DГ–NEM SEГ‡ */
.donem-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.donem-btn{
  padding:10px;border-radius:10px;background:var(--s1);border:1.5px solid var(--bd);
  text-align:center;cursor:pointer;transition:all .2s;
}
.donem-btn.secili{border-color:var(--ac);background:var(--acl)}
.donem-btn:active{transform:scale(.97)}
.db-ikon{font-size:18px;margin-bottom:4px}
.db-ad{font-size:11px;font-weight:700}
.db-alt{font-size:9px;color:var(--tx3);margin-top:2px}

/* Д°Г‡ERД°K SEГ‡ */
.icerik-grid{display:flex;flex-direction:column;gap:6px}
.icerik-toggle{
  display:flex;align-items:center;gap:12px;
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:10px 14px;cursor:pointer;transition:all .15s;
}
.icerik-toggle.aktif{background:var(--s2)}
.it-ikon{font-size:16px;flex-shrink:0}
.it-txt{flex:1;font-size:12px;font-weight:600}
.it-switch{
  width:36px;height:20px;border-radius:10px;background:var(--s3);
  position:relative;transition:background .2s;flex-shrink:0;
}
.icerik-toggle.aktif .it-switch{background:var(--ac)}
.it-switch::after{
  content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .2s;
}
.icerik-toggle.aktif .it-switch::after{transform:translateX(16px)}

/* FORMAT BUTONLARI */
.format-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.format-btn{
  padding:14px 10px;border-radius:var(--rad);border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;
  transition:all .2s;
}
.format-btn:active{transform:scale(.96)}
.format-btn.pdf{background:linear-gradient(135deg,#EF4444,#B91C1C);color:#fff}
.format-btn.excel{background:linear-gradient(135deg,#10B981,#059669);color:#fff}
.format-btn .fb-ikon{font-size:24px}
.format-btn .fb-alt{font-size:9px;opacity:.8;font-weight:600}

/* Г–NД°ZLEME */
.onizleme{
  background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rad);
  padding:16px;margin-top:4px;
}
.oz-baslik{font-size:11px;font-weight:800;color:var(--tx2);margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.oz-satir{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--bd);}
.oz-satir:last-child{border-bottom:none}
.oz-lbl{font-size:11px;color:var(--tx3)}
.oz-val{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}

/* TOAST */
.toast{
  position:fixed;bottom:calc(var(--safeb)+20px);left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--s2);border:1px solid var(--bd2);border-radius:10px;
  padding:10px 18px;font-size:12px;font-weight:700;
  white-space:nowrap;z-index:200;transition:transform .3s ease;
  display:flex;align-items:center;gap:8px;
}
.toast.goster{transform:translateX(-50%) translateY(0)}

/* PRINT STYLE - PDF iГ§in */
@media print{
  body{background:#fff!important;color:#000!important;overflow:visible!important;max-width:100%!important;height:auto!important}
  .hdr,.format-row,.icerik-grid,.donem-grid,.firma-secici,.bolum,.scroll{display:none!important}
  .pdf-icerik{display:block!important}
  body::before{display:none!important}
}
.pdf-icerik{display:none}
/* в•ђв•ђ RAPOR YENД° CSS в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,20px)}
.scroll::-webkit-scrollbar{display:none}

/* Firma bar */
.r-firma-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--s1)}
.r-fb-ad{font-size:14px;font-weight:800}
.r-fb-alt{font-size:10px;color:var(--tx3);margin-top:1px}
.r-firma-btn{padding:5px 12px;border-radius:8px;background:var(--s3);border:1px solid var(--bd2);color:var(--tx2);font-size:11px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer}

/* Firma seГ§ici */
.r-firma-secici{padding:8px 12px;border-bottom:1px solid var(--bd)}

/* DГ¶nem scroll */
.r-donem-scroll{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--bd);flex-shrink:0}
.r-donem-scroll::-webkit-scrollbar{display:none}
.r-donem-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:800;background:var(--s2);border:1px solid var(--bd);color:var(--tx3);cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap;transition:all .15s}
.r-donem-btn.on{background:var(--acl);border-color:var(--ac);color:var(--ac)}
.r-donem-btn:active{transform:scale(.95)}

/* Sekme bar */
.r-sekme-bar{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid var(--bd);background:var(--s1);flex-shrink:0}
.r-stab{padding:11px 4px;font-size:10px;font-weight:800;color:var(--tx3);background:none;border:none;font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-2px}
.r-stab.on{color:var(--ac);border-bottom-color:var(--ac)}
.r-stab:active{background:var(--s2)}

/* Д°Г§erik */
.r-icerik{padding:12px 12px 0;display:flex;flex-direction:column;gap:10px}

/* Kart */
.ra-kart{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.ra-kart-bas{padding:12px 14px 0;display:flex;align-items:center;justify-content:space-between}
.ra-kart-tit{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.ra-kart-ikon{font-size:16px;opacity:.6}

/* KPI grid 2x2 */
.ra-kpi{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd);border-radius:12px;overflow:hidden;margin:0 12px 12px}
.ra-kpi-k{background:var(--s1);padding:12px;display:flex;flex-direction:column;gap:3px}
.ra-kpi-lbl{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em}
.ra-kpi-val{font-size:18px;font-weight:800;font-family:monospace;line-height:1.1}
.ra-kpi-sub{font-size:9px;color:var(--tx3)}

/* Progress bar */
.ra-prog{padding:0 14px 12px}
.ra-prog-row{margin-bottom:10px}
.ra-prog-hdr{display:flex;justify-content:space-between;font-size:10px;margin-bottom:5px}
.ra-prog-lbl{font-weight:700;color:var(--tx2)}
.ra-prog-val{font-weight:800;font-family:monospace;color:var(--tx)}
.ra-prog-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden}
.ra-prog-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* Liste satД±r */
.ra-satir{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-top:1px solid var(--bd)}
.ra-satir-sol{flex:1;min-width:0}
.ra-satir-ad{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ra-satir-alt{font-size:9px;color:var(--tx3);margin-top:1px}
.ra-satir-sag{text-align:right;flex-shrink:0;margin-left:10px}
.ra-satir-val{font-size:11px;font-weight:800;font-family:monospace}
.ra-satir-sub{font-size:9px;color:var(--tx3)}

/* Badge */
.ra-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;display:inline-block}
.ra-badge.g{background:var(--gl);color:var(--g)}
.ra-badge.r{background:rgba(239,68,68,.1);color:var(--r)}
.ra-badge.a{background:rgba(245,158,11,.1);color:var(--a)}
.ra-badge.notr{background:var(--s3);color:var(--tx3)}

/* AylД±k trend bar */
.ra-trend{display:flex;align-items:flex-end;gap:3px;padding:8px 14px 12px;height:56px}
.ra-trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;transition:height .4s ease}

/* BГјyГјk metrik */
.ra-metric{padding:14px}
.ra-metric-val{font-size:32px;font-weight:800;font-family:monospace;line-height:1}
.ra-metric-lbl{font-size:10px;color:var(--tx3);margin-top:4px}
.ra-metric-degisim{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px;margin-top:6px}

/* Д°ndir bar */
.r-indir-bar{display:flex;gap:8px;padding:12px}
.r-indir-btn{flex:1;padding:12px;border-radius:11px;border:none;font-size:12px;font-weight:800;font-family:'Syne',sans-serif;cursor:pointer;transition:all .15s}
.r-indir-btn.pdf{background:rgba(239,68,68,.12);color:var(--r)}
.r-indir-btn.xls{background:rgba(16,185,129,.12);color:var(--g)}
.r-indir-btn.wp{background:rgba(59,130,246,.12);color:var(--ac)}
.r-indir-btn:active{transform:scale(.97)}

/* Tahmin kart */
.ra-tahmin{padding:12px 14px}
.ra-tahmin-ay{display:grid;grid-template-columns:2fr 1fr 1fr;gap:4px;margin-bottom:4px;align-items:center}
.ra-tahmin-ad{font-size:11px;font-weight:700}
.ra-tahmin-val{font-size:11px;font-weight:800;font-family:monospace;text-align:right}
.ra-tahmin-pct{font-size:9px;font-weight:800;text-align:right}

/* KayД±p mГјЕџteri */
.ra-kayip{padding:12px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--bd)}
.ra-kayip-av{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:16px;font-weight:900;flex-shrink:0}
.ra-kayip-bilgi{flex:1}
.ra-kayip-ad{font-size:11px;font-weight:800}
.ra-kayip-alt{font-size:9px;color:var(--tx3);margin-top:2px}
.ra-kayip-gun{font-size:11px;font-weight:800;flex-shrink:0;color:var(--r)}

</style>
</head>

  <!-- в”Ђв”Ђ SEKME Д°Г‡ERД°KLERД° в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ -->

<script>

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// iSTasyon Veri Motoru v2 вЂ” TГјm modГјllerde ortak kullanД±lД±r
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const AYLAR = ['Oca','Ећub','Mar','Nis','May','Haz','Tem','AДџu','Eyl','Eki','Kas','Ara'];
const RENKLER = ['#3B82F6','#10B981','#F59E0B','#8B5CF6','#EF4444','#06B6D4','#F97316','#14B8A6','#EC4899','#84CC16'];

function yuzde(a,b){if(!b)return 0;return Math.round(a/b*1000)/10;}
function degisim(yeni,eski){if(!eski)return 0;return Math.round((yeni-eski)/eski*1000)/10;}

function veriAl(firmaId){
  try{const r=localStorage.getItem('ist_veri_'+(firmaId||aktifFirmaId()));if(!r)return null;return JSON.parse(r);}
  catch(e){return null;}
}

function aylikTrendUret(toplamCiro, aylikArr){
  if(aylikArr&&aylikArr.length===12){
    return aylikArr.map((v,i)=>({ay:AYLAR[i],idx:i,ciro:Math.round(v),gecen:Math.round(v*(0.82+Math.random()*0.26)),adet:Math.round(v/1200)}));
  }
  const base=(toplamCiro||500000)/12;
  const mv=[0.75,0.78,0.88,0.92,1.05,1.12,1.08,1.15,1.10,1.05,0.95,1.17];
  return AYLAR.map((ay,i)=>({ay,idx:i,ciro:Math.round(base*mv[i]*(0.9+Math.random()*0.2)),gecen:Math.round(base*mv[i]*(0.8+Math.random()*0.15)),adet:Math.round(base*mv[i]/1200)}));
}

function cariListesiUret(firmaId){
  const veri=veriAl(firmaId);if(!veri)return null;
  const urunler=veri.urunler||[];const kategoriler=veri.kategoriler||[];
  const toplamCiro=veri.toplam_ciro||0;
  const aylik=aylikTrendUret(toplamCiro,veri.aylik_ciro);
  if(urunler.length===0&&kategoriler.length===0)return null;
  let cariler=[];
  if(urunler.length>0){
    const grp={};
    urunler.forEach((u,i)=>{
      const key=(u.kategori||u.ad||'DiДџer').toUpperCase();
      if(!grp[key]){
        const idx=Object.keys(grp).length;
        grp[key]={id:'C'+String(idx+1).padStart(3,'0'),
          ad:key.charAt(0)+key.slice(1).toLowerCase(),sehir:veri.sehir||'Bursa',
          tip:key,renk:RENKLER[idx%RENKLER.length],
          risk:'Д°YД°',bakiye:0,toplam_borc:0,
          ozet:{bu_yil_ciro:0,gecen_yil_ciro:0,bu_yil_adet:0,gecen_yil_adet:0,ort_fiyat:0,son_alis:''},
          urunler:[],faturalar:[],
          aylik:aylik.map(a=>({...a,ciro:0,gecen:0,adet:0,tahsilat:0})),
        };
      }
      const c=grp[key];
      const c25=u.ciro25||0;const a25=u.adet25||0;
      c.ozet.bu_yil_ciro+=c25;c.ozet.bu_yil_adet+=a25;
      c.ozet.gecen_yil_ciro+=u.ciro24||Math.round(c25*0.92);
      c.ozet.gecen_yil_adet+=u.adet24||Math.round(a25*0.90);
      c.urunler.push({ad:u.ad,kategori:u.kategori||key,adet:Math.round(a25),tutar:Math.round(c25),
        ort_fiyat:a25>0?Math.round(c25/a25):0,adet24:Math.round(u.adet24||a25*0.9),tutar24:Math.round(u.ciro24||c25*0.92)});
    });
    Object.values(grp).forEach(c=>{
      const cv=c.ozet.bu_yil_ciro;const gv=c.ozet.gecen_yil_ciro;const tp=toplamCiro||1;
      c.aylik=aylik.map(a=>({...a,ciro:Math.round(a.ciro*cv/tp),gecen:Math.round(a.gecen*gv/tp),adet:Math.round(a.adet*cv/tp),tahsilat:Math.round(a.ciro*cv/tp*0.95)}));
      c.bakiye=Math.round(cv*0.08);c.toplam_borc=Math.round(cv*0.12);
      c.risk=cv>200000?'Д°YД°':cv>80000?'ORTA':'RД°SKLД°';
      c.ozet.ort_fiyat=c.ozet.bu_yil_adet>0?Math.round(cv/c.ozet.bu_yil_adet):0;
      c.ozet.son_alis=new Date(Date.now()-Math.random()*60*86400000).toLocaleDateString('tr-TR');
      c.faturalar=c.urunler.slice(0,6).map((u,i)=>({no:'F'+String(2400+i),
        tarih:new Date(Date.now()-(i+1)*18*86400000).toLocaleDateString('tr-TR'),
        aciklama:u.ad,tutar:u.tutar,durum:i===0?'BEKLIYOR':i===4?'GECД°KTД°':'Г–DENDД°'}));
    });
    cariler=Object.values(grp).sort((a,b)=>b.ozet.bu_yil_ciro-a.ozet.bu_yil_ciro);
  } else {
    cariler=kategoriler.map(([kat,ciro],i)=>{
      const gecen=Math.round(ciro*0.91);
      return {id:'K'+String(i+1).padStart(3,'0'),ad:kat,sehir:veri.sehir||'Bursa',tip:kat,
        renk:RENKLER[i%RENKLER.length],
        risk:ciro>200000?'Д°YД°':ciro>80000?'ORTA':'RД°SKLД°',
        bakiye:Math.round(ciro*0.08),toplam_borc:Math.round(ciro*0.12),
        ozet:{bu_yil_ciro:ciro,gecen_yil_ciro:gecen,bu_yil_adet:Math.round(ciro/1200),gecen_yil_adet:Math.round(gecen/1200),ort_fiyat:1200,son_alis:new Date(Date.now()-Math.random()*45*86400000).toLocaleDateString('tr-TR')},
        urunler:[{ad:kat,adet:Math.round(ciro/1200),tutar:ciro,ort_fiyat:1200,adet24:Math.round(gecen/1200),tutar24:gecen}],
        aylik:aylik.map(a=>({...a,ciro:Math.round(a.ciro*ciro/toplamCiro),gecen:Math.round(a.gecen*gecen/toplamCiro),adet:Math.round(a.adet*ciro/toplamCiro),tahsilat:Math.round(a.ciro*ciro/toplamCiro*0.95)})),
        faturalar:Array.from({length:4},(_,j)=>({no:'F'+String(2400+j),tarih:new Date(Date.now()-(j+1)*21*86400000).toLocaleDateString('tr-TR'),aciklama:kat,tutar:Math.round(ciro/4),durum:j===0?'BEKLIYOR':j===3?'GECД°KTД°':'Г–DENDД°'})),
      };
    });
  }
  return cariler.length>0?cariler:null;
}

function stokListesiUret(firmaId){
  const veri=veriAl(firmaId);if(!veri)return null;
  const urunler=veri.urunler||[];if(urunler.length===0)return null;
  const IKON={ANTД°BД°YOTД°K:'рџ’Љ',ANALJEZД°K:'рџ’Љ',VД°TAMД°N:'рџ§ґ',MDF:'рџЄµ',KAPLAMA:'рџЄµ',MOBД°LYA:'рџ›‹',DEPOLAMA:'рџ“¦',AYDINLATMA:'рџ’Ў',TEKSTД°L:'рџ§µ',Д°LAГ‡:'рџ’Љ',MEDД°KAL:'рџЏҐ',AMELД°YAT:'рџ”¬',DД°ДћER:'рџ“¦',SATIЕћ:'рџ›’'};
  const aylik=aylikTrendUret(veri.toplam_ciro,veri.aylik_ciro);
  const tp=veri.toplam_ciro||1;
  return urunler.slice(0,40).map((u,i)=>{
    const kat=(u.kategori||'DД°ДћER').toUpperCase();
    const adet=Math.round(u.adet25||0);const ciro=u.ciro25||0;
    const birimFiyat=adet>0?Math.round(ciro/adet):Math.round(200+Math.random()*800);
    const maxStok=Math.max(adet*2,100);const minStok=Math.round(maxStok*0.15);
    const mevcut=adet>0?Math.round(adet*(0.25+Math.random()*0.75)):Math.round(50+Math.random()*150);
    const durum=mevcut<minStok?'KRД°TД°K':mevcut<minStok*2?'AZ':'NORMAL';
    return {
      id:'S'+String(i+1).padStart(3,'0'),ad:u.ad,kod:'KOD-'+String(1000+i),
      kategori:kat,ikon:IKON[kat]||'рџ“¦',renk:RENKLER[i%RENKLER.length],
      mevcut,minStok,maxStok,durum,doluluk:Math.round(mevcut/maxStok*100),
      birimFiyat,stokDeger:mevcut*birimFiyat,
      ciro25:Math.round(ciro),adet25:adet,
      ciro24:Math.round(u.ciro24||ciro*0.91),adet24:Math.round(u.adet24||adet*0.90),
      aylik:aylik.map(a=>({...a,adet:Math.round((a.adet*(ciro/tp))||Math.random()*50+10),ciro:Math.round(a.ciro*(ciro/tp)),gecen:Math.round(a.gecen*(ciro/tp))})),
      tedarikci:'TedarikГ§i '+(String.fromCharCode(65+(i%5))),
      tedarikci_sure:Math.round(3+Math.random()*7)+' gГјn',
      son_giris:new Date(Date.now()-Math.random()*30*86400000).toLocaleDateString('tr-TR'),
      son_cikis:new Date(Date.now()-Math.random()*10*86400000).toLocaleDateString('tr-TR'),
    };
  });
}

function raporVerisiUret(firmaId){
  const veri=veriAl(firmaId);if(!veri)return null;
  const firma=(typeof firmalariAl==='function'?firmalariAl():[]).find(f=>f.id===(firmaId||SESYON.id))||{ad:'Firma'};
  const ciro=veri.toplam_ciro||0;const kar=veri.toplam_kar||0;
  const gider=veri.toplam_gider||0;const netKar=veri.net_kar||(kar-gider);
  const aylik=aylikTrendUret(ciro,veri.aylik_ciro);
  const cariler=cariListesiUret(firmaId)||[];
  const stoklar=stokListesiUret(firmaId)||[];
  const katMap={};
  (veri.urunler||[]).forEach(u=>{const k=u.kategori||'DiДџer';katMap[k]=(katMap[k]||0)+(u.ciro25||0);});
  const kategoriPay=Object.entries(katMap).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v],i)=>({ad:k,ciro:Math.round(v),pay:yuzde(v,ciro),renk:RENKLER[i]}));
  const topKalemler=(veri.urunler||[]).sort((a,b)=>(b.ciro25||0)-(a.ciro25||0)).slice(0,10).map((u,i)=>({
    sira:i+1,ad:u.ad,kategori:u.kategori||'DiДџer',
    ciro:Math.round(u.ciro25||0),adet:Math.round(u.adet25||0),
    ciro24:Math.round(u.ciro24||u.ciro25*0.91||0),
    pay:yuzde(u.ciro25||0,ciro),degisim:degisim(u.ciro25||0,u.ciro24||u.ciro25*0.91||0),
  }));
  return {
    firma,firmaId:firmaId||SESYON.id,
    ozet:{ciro,kar,gider,netKar,
      brutMarj:yuzde(kar,ciro),netMarj:yuzde(netKar,ciro),
      ciro24:Math.round(ciro*0.91),kar24:Math.round(kar*0.88),
      degisim:degisim(ciro,ciro*0.91),
      toplamCari:cariler.length,riskliCari:cariler.filter(c=>c.risk==='RД°SKLД°').length,
      kritikStok:stoklar.filter(s=>s.durum==='KRД°TД°K').length,
    },
    aylik,topKalemler,kategoriPay,cariler,stoklar,
    guncelleme:veri.guncelleme||new Date().toISOString(),kaynak:veri.kaynak||'Demo',
  };
}

// в”Ђв”Ђ GERГ‡EK VERД° OKUMA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function gercekVeriAl(firmaId){
  try{
    const v = localStorage.getItem('ist_veri_'+(firmaId||aktifFirmaId()));
    if(!v) return null;
    const veri = JSON.parse(v);

    const ciro = veri.toplam_ciro||0;
    const kar  = veri.toplam_kar||0;
    const gider= veri.toplam_gider||0;
    const netKar = veri.net_kar||(kar-gider);
    const marj = ciro>0?Math.round(kar/ciro*100*10)/10:0;
    const netMarj = ciro>0?Math.round(netKar/ciro*100*10)/10:0;

    // SatД±Еџlar вЂ” ГјrГјnlerden veya kategorilerden
    let satislar = [];
    if((veri.urunler||[]).length>0){
      satislar = veri.urunler.slice(0,12).map((u,i)=>({
        fatura_no: (firmaId==='woodlent'?'WL-':'SF-')+(1200+i),
        musteri: u.ad,
        urun: u.kategori||'SatД±Еџ',
        tutar: u.ciro25||0,
        maliyet: u.maliyet25||Math.round((u.ciro25||0)*0.70),
        kar: u.kar25||Math.round((u.ciro25||0)*0.30),
        marj: u.marj25||30,
      }));
    } else if((veri.kategoriler||[]).length>0){
      satislar = veri.kategoriler.map(([kat,ciro],i)=>({
        fatura_no: 'KT-'+(100+i),
        musteri: kat,
        urun: kat,
        tutar: ciro,
        maliyet: Math.round(ciro*0.70),
        kar: Math.round(ciro*0.30),
        marj: 30,
      }));
    }

    // Giderler
    const giderler = (veri.giderler||[]).map(g=>({
      kalem: g.kalem,
      tutar: g.toplam||0,
      kategori: g.kalem.toUpperCase().includes('PERSONEL')?'PERSONEL':
                g.kalem.toUpperCase().includes('KД°RA')||g.kalem.toUpperCase().includes('KIRA')?'KД°RA':
                g.kalem.toUpperCase().includes('ENERJI')||g.kalem.toUpperCase().includes('ENERJД°')?'ENERJД°':'DД°ДћER',
    }));

    return {
      gercek: true,
      kaynak: veri.kaynak||veri.tip||'iSTasyon',
      tarih: veri.tarih,
      ozet:{
        ciro, brut_kar:kar, brut_marj:marj,
        gider, net_kar:netKar, net_marj:netMarj,
        fatura: satislar.length,
        musteri: [...new Set(satislar.map(s=>s.musteri))].length,
      },
      satislar,
      giderler: giderler.length>0 ? giderler : [],
      aylik_ciro: veri.aylik_ciro||[],
      karsilastirma:{
        dun:{ciro:Math.round(ciro*0.92),net_kar:Math.round(netKar*0.92)},
        gecen_hafta:{ciro:Math.round(ciro*3.8),net_kar:Math.round(netKar*3.8)},
        gecen_ay:{ciro:Math.round(ciro*0.96),net_kar:Math.round(netKar*0.96)},
      }
    };
  } catch(e){ return null; }
}

function raporVeriSec(firmaId){
  // Г–nce v2 motor dene
  const motorVeri = raporVerisiUret(firmaId);
  if(motorVeri) return motorVeri;
  // Eski gercekVeriAl dene
  const gercek = gercekVeriAl(firmaId);

}

// в”Ђв”Ђ 1. Г–ZET в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  var el = document.getElementById('r-'+id);
  if(!el) return;
  var v = _veri();
  if(!v){ el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--tx3);font-size:12px">Veri yГјklenmedi вЂ” Veri YГјkle sayfasД±na git</div>'; return; }

  if(id==='ozet')      el.innerHTML = _renderOzet(v);
  if(id==='karlilik')  el.innerHTML = _renderKarlilik(v);
  if(id==='musteri')   el.innerHTML = _renderMusteri(v);
  if(id==='tahmin')    el.innerHTML = _renderTahmin(v);
}

function _renderOzet(v){
  var o = v.ozet||{};
  var aylik = v.aylik||[];
  var renk = (typeof aktifFirmaObjesi==='function') ? (aktifFirmaObjesi().renk||'#3B82F6') : '#3B82F6';
  var maxC = Math.max.apply(null, aylik.map(function(a){ return a.ciro||0; }).concat([1]));
  var buAyIdx = new Date().getMonth();

  var barHtml = '';
  for(var i=0; i<aylik.length; i++){
    var a = aylik[i];
    var h = Math.max(3, Math.round((a.ciro||0)/maxC*40));
    var ak = (i===buAyIdx);
    barHtml += '<div class="ra-trend-bar" style="height:'+h+'px;background:'+(ak?renk:'rgba(100,180,255,.15)')+'" title="'+a.ay+': '+para(a.ciro)+'"></div>';
  }

  var html = '';

  // BГјyГјk ciro metrik
  html += '<div class="ra-kart">';
  html += '<div class="ra-kart-bas"><div class="ra-kart-tit">'+donemAdiAl()+' Г–zeti</div><div class="ra-kart-ikon">рџ“Љ</div></div>';
  html += '<div class="ra-metric" style="padding-bottom:0">';
  html += '<div class="ra-metric-val" style="color:'+renk+'">'+para(o.ciro)+'</div>';
  html += '<div class="ra-metric-lbl">Toplam Ciro</div>';
  var dg = o.degisim||0; var dgArtis = dg>=0;
  html += '<div class="ra-metric-degisim" style="background:'+(dgArtis?'var(--gl)':'rgba(239,68,68,.1)')+';color:'+(dgArtis?'var(--g)':'var(--r)')+'">'+(dgArtis?'в–І':'в–ј')+' %'+Math.abs(dg)+' geГ§en dГ¶neme gГ¶re</div>';
  html += '</div>';
  html += '<div class="ra-trend">'+barHtml+'</div>';
  html += '</div>';

  // 4'lГј KPI
  html += '<div class="ra-kpi">';
  html += _kpiKart('BrГјt KГўr', para(o.kar), '%'+o.brutMarj+' marj', 'var(--g)');
  html += _kpiKart('Net KГўr',  para(o.netKar), '%'+o.netMarj+' marj', 'var(--g)');
  html += _kpiKart('Gider',    para(o.gider),  '%'+Math.round((o.gider||0)/(o.ciro||1)*100)+' oran', 'var(--a)');
  html += _kpiKart('Riskli Cari', (o.riskliCari||0)+' mГјЕџteri', (o.toplamCari||0)+' toplam', (o.riskliCari>0?'var(--r)':'var(--g)'));
  html += '</div>';

  // Top 5 satД±Еџ kalemi
  var topK = (v.topKalemler||[]).slice(0,5);
  if(topK.length>0){
    html += '<div class="ra-kart">';
    html += '<div class="ra-kart-bas" style="margin-bottom:6px"><div class="ra-kart-tit">Top SatД±Еџ Kalemleri</div><div class="ra-kart-ikon">рџЏ†</div></div>';
    var topMax = Math.max.apply(null, topK.map(function(k){return k.ciro||0;}).concat([1]));
    html += '<div class="ra-prog">';
    for(var ki=0; ki<topK.length; ki++){
      var k = topK[ki];
      var pct = Math.round((k.ciro||0)/topMax*100);
      html += '<div class="ra-prog-row">';

    html += '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;padding:0 14px 12px">';

    html += '<div style="font-size:18px;font-weight:800;font-family:monospace;color:var(--tx3)">'+para(toplamGecen)+'</div></div>';
    html += '<div style="text-align:center;font-size:16px;font-weight:900;color:'+(yArtis?'var(--g)':'var(--r)')+'">'+( yArtis?'в–І':'в–ј')+'</div>';

    html += '<div style="font-size:18px;font-weight:800;font-family:monospace;color:'+renk+'">'+para(toplamBuYil)+'</div></div>';

    // AylД±k tablo
    html += '<div style="margin:0 14px 12px;background:var(--s2);border-radius:10px;overflow:hidden">';
    html += '<div style="display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;padding:6px 10px;border-bottom:1px solid var(--bd)">';

    for(var mi=0; mi<aylik.length; mi++){

      html += '</div>';

  return html;
}

// в”Ђв”Ђ 3. MГњЕћTERД° ANALД°ZД° в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function _renderMusteri(v){
  var cariler = v.cariler||[];

  // Г–zet KPI
  html += '<div class="ra-kart">';

  html += '<div class="ra-kpi" style="margin-top:8px">';
  html += _kpiKart('Toplam Cari',    (o.toplamCari||0)+'',         'aktif mГјЕџteri', 'var(--ac)');

  html += _kpiKart('Aktif Oran',     '%'+Math.round((Math.max(0,(o.toplamCari||0)-(o.riskliCari||0)))/(o.toplamCari||1)*100), 'temiz mГјЕџteri', 'var(--g)');
  html += '</div>';
  html += '</div>';

  // KayД±p / uyarД± listesi
  var kayiplar = cariler.filter(function(c){
    return c.risk==='RД°SKLД°' || c.bakiye>0;
  }).slice(0,6);

  if(kayiplar.length>0){
    html += '<div class="ra-kart">';
    html += '<div class="ra-kart-bas" style="margin-bottom:0"><div class="ra-kart-tit">вљ  Dikkat Gerektiren</div></div>';
    for(var i=0; i<kayiplar.length; i++){
      var c2 = kayiplar[i];
      var renk = RENKLER[i%RENKLER.length];
      html += '<div class="ra-kayip">';
      html += '<div class="ra-kayip-av" style="background:'+renk+'22;color:'+renk+'">'+c2.ad.charAt(0).toUpperCase()+'</div>';
      html += '<div class="ra-kayip-bilgi">';
      html += '<div class="ra-kayip-ad">'+c2.ad+'</div>';
      html += '<div class="ra-kayip-alt">'+(c2.sehir||'')+' В· '+(c2.tip||'')+'</div>';
      html += '</div>';
      html += '<div style="text-align:right;flex-shrink:0">';
      html += '<div style="font-size:11px;font-weight:800;font-family:monospace;color:var(--r)">'+para(c2.bakiye||0)+'</div>';
      html += '<div class="ra-badge r">'+( c2.risk||'?')+'</div>';
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  // KayД±p mГјЕџteri tespiti вЂ” 90+ gГјn alД±m yok
  var sonAlisHesapla = function(sonAlis){
    if(!sonAlis||sonAlis==='вЂ”') return 999;
    try{
      var p=sonAlis.split('.');
      if(p.length!==3) return 999;
      return Math.round((Date.now()-new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])).getTime())/86400000);
    }catch(e){return 999;}
  };

  var kayipMusteriler = cariler.filter(function(c2){
    var gun = sonAlisHesapla(c2.ozet&&c2.ozet.son_alis);
    return gun > 90;
  }).sort(function(a,b){
    return sonAlisHesapla(b.ozet&&b.ozet.son_alis) - sonAlisHesapla(a.ozet&&a.ozet.son_alis);
  }).slice(0,6);

  if(kayipMusteriler.length>0){
    html += '<div class="ra-kart">';
    html += '<div class="ra-kart-bas" style="margin-bottom:0"><div class="ra-kart-tit">рџљЁ KayД±p MГјЕџteri Riski</div><div class="ra-badge r">'+kayipMusteriler.length+' mГјЕџteri</div></div>';
    for(var j=0; j<kayipMusteriler.length; j++){
      var cm = kayipMusteriler[j];
      var gun2 = sonAlisHesapla(cm.ozet&&cm.ozet.son_alis);
      var renkCm = RENKLER[j%RENKLER.length];
      var gunMetin = gun2>365 ? Math.round(gun2/365)+'y '+Math.round((gun2%365)/30)+'a' : Math.round(gun2/30)+' ay';
      html += '<div class="ra-kayip">';
      html += '<div class="ra-kayip-av" style="background:'+renkCm+'22;color:'+renkCm+'">'+cm.ad.charAt(0).toUpperCase()+'</div>';
      html += '<div class="ra-kayip-bilgi">';
      html += '<div class="ra-kayip-ad">'+cm.ad+'</div>';
      html += '<div class="ra-kayip-alt">Son alД±m: '+(cm.ozet&&cm.ozet.son_alis||'?')+' В· '+(cm.ozet&&cm.ozet.bu_yil_ciro?para(cm.ozet.bu_yil_ciro):'вЂ”')+' ciro</div>';
      html += '</div>';
      html += '<div class="ra-kayip-gun">'+gunMetin+'<br><span style="font-size:8px;color:var(--tx3)">almД±yor</span></div>';
      html += '</div>';
    }
    html += '</div>';
  } else if(cariler.length>0){
    html += '<div class="ra-kart" style="padding:16px;text-align:center">';
    html += '<div style="font-size:20px;margin-bottom:6px">вњ…</div>';
    html += '<div style="font-size:12px;font-weight:800;color:var(--g)">KayД±p mГјЕџteri yok</div>';
    html += '<div style="font-size:10px;color:var(--tx3);margin-top:3px">TГјm mГјЕџteriler son 90 gГјnde alД±m yapmД±Еџ</div>';
    html += '</div>';
  }

  // Top cari listesi
  var topCari = cariler.slice().sort(function(a,b){
    return ((b.ozet&&b.ozet.bu_yil_ciro)||0) - ((a.ozet&&a.ozet.bu_yil_ciro)||0);
  }).slice(0,6);

  if(topCari.length>0){
    html += '<div class="ra-kart">';
    html += '<div class="ra-kart-bas" style="margin-bottom:0"><div class="ra-kart-tit">Top MГјЕџteriler</div><div class="ra-kart-ikon">рџЏ…</div></div>';
    for(var ti=0; ti<topCari.length; ti++){
      var tc = topCari[ti];
      var tcR = RENKLER[ti%RENKLER.length];
      html += '<div class="ra-satir">';
      html += '<div style="width:22px;height:22px;border-radius:7px;background:'+tcR+'22;color:'+tcR+';font-size:10px;font-weight:900;display:grid;place-items:center;flex-shrink:0">'+(ti+1)+'</div>';
      html += '<div class="ra-satir-sol" style="margin-left:8px"><div class="ra-satir-ad">'+tc.ad+'</div><div class="ra-satir-alt">'+(tc.sehir||'')+' В· '+(tc.risk||'вЂ”')+'</div></div>';
      html += '<div class="ra-satir-sag"><div class="ra-satir-val" style="color:'+tcR+'">'+para((tc.ozet&&tc.ozet.bu_yil_ciro)||0)+'</div><div class="ra-satir-sub">'+(tc.bakiye>0?'BorГ§lu':'Temiz')+'</div></div>';
      html += '</div>';
    }
    html += '</div>';
  }

  return html;
}

// в”Ђв”Ђ 4. TAHMД°N в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    html += '<div style="font-size:8px;font-weight:800;color:var(--r);text-align:right">KГ¶tГј</div>';
    html += '</div>';
    for(var ai=0; ai<gelecekAylar.length; ai++){
      var ga = gelecekAylar[ai];
