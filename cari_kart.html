<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080B0F;--s1:#0E1318;--s2:#131A22;--s3:#1A2330;
  --bd:rgba(100,180,255,0.07);--bd2:rgba(100,180,255,0.14);
  --tx:#E8F0F8;--tx2:#8AA4BF;--tx3:#445566;
  --ac:#3B82F6;--acl:rgba(59,130,246,0.12);
  --g:#10B981;--gl:rgba(16,185,129,0.1);
  --r:#EF4444;--rl:rgba(239,68,68,0.1);
  --a:#F59E0B;--al:rgba(245,158,11,0.1);
  --p:#8B5CF6;--pl:rgba(139,92,246,0.1);
  --rad:14px;
  --safe:env(safe-area-inset-top,20px);
  --safeb:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:440px;margin:0 auto}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,130,246,0.06),transparent),
             radial-gradient(ellipse 40% 40% at 90% 80%,rgba(139,92,246,0.04),transparent);}

/* HEADER */
.hdr{padding:calc(var(--safe)+10px) 18px 12px;flex-shrink:0;position:relative;z-index:10;
  background:rgba(8,11,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-back{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);
  display:grid;place-items:center;font-size:16px;cursor:pointer;flex-shrink:0;
  transition:all .15s;text-decoration:none;color:var(--tx);}
.hdr-back:active{transform:scale(.92)}
.hdr-ara{flex:1;display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;}
.hdr-ara input{flex:1;background:none;border:none;outline:none;color:var(--tx);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:600;}
.hdr-ara input::placeholder{color:var(--tx3)}

/* LİSTE EKRANI */
.liste-ekran{flex:1;overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.liste-ekran::-webkit-scrollbar{display:none}

.cari-item{
  display:flex;align-items:center;gap:12px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);
  padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.cari-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--renk,var(--ac));border-radius:2px 0 0 2px;}
.cari-item:active{transform:scale(.98);background:var(--s2)}
.ci-avatar{width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:grid;place-items:center;font-size:16px;font-weight:800;
  background:var(--acl);color:var(--ac);}
.ci-bilgi{flex:1;min-width:0}
.ci-ad{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-alt{font-size:10px;color:var(--tx3);margin-top:3px;display:flex;gap:8px}
.ci-tag{padding:2px 7px;border-radius:4px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.ci-sag{text-align:right;flex-shrink:0}
.ci-ciro{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--g)}
.ci-risk{font-size:9px;margin-top:3px;font-weight:700;padding:2px 7px;border-radius:4px}
.risk-iyi{background:var(--gl);color:var(--g)}
.risk-orta{background:var(--al);color:var(--a)}
.risk-yuksek{background:var(--rl);color:var(--r)}

.bolum-bas{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.15em;margin:14px 0 8px 2px}

/* DETAY EKRANI */
.detay-ekran{position:absolute;inset:0;background:var(--bg);z-index:20;
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.detay-ekran.aktif{transform:translateX(0)}

.detay-hdr{padding:calc(var(--safe)+10px) 18px 0;flex-shrink:0;
  background:rgba(8,11,15,0.95);backdrop-filter:blur(20px);}
.dh-row{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--bd);}
.dh-back{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);
  display:grid;place-items:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.dh-back:active{transform:scale(.92)}
.dh-bilgi{flex:1;min-width:0}
.dh-ad{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-alt{font-size:10px;color:var(--tx3);margin-top:2px}

/* SEKMELER */
.tab-bar{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--bd);
  overflow-x:auto;flex-shrink:0;}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;font-size:10px;font-weight:800;color:var(--tx3);
  white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Syne',sans-serif;}
.tab-btn.aktif{color:var(--ac);border-bottom-color:var(--ac)}

.detay-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 24px;-webkit-overflow-scrolling:touch;}
.detay-scroll::-webkit-scrollbar{display:none}

.sekme{display:none}
.sekme.aktif{display:block}

/* KARTlar */
.kart{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);
  padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.kart-bas{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.12em;margin-bottom:10px}

/* ÖZET BANNER */
.ozet-banner{
  background:linear-gradient(135deg,var(--s2),var(--s3));
  border:1px solid var(--bd2);border-radius:var(--rad);
  padding:16px;margin-bottom:10px;position:relative;overflow:hidden;
}
.ob-bg{position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-size:72px;opacity:.03;font-weight:900;pointer-events:none;}
.ob-ad{font-size:18px;font-weight:800;margin-bottom:4px}
.ob-sehir{font-size:10px;color:var(--tx3);margin-bottom:12px}
.ob-kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ob-k{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 10px;}
.ob-k .lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.ob-k .val{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;margin-top:3px}

/* AYLIK TABLO */
.aylik-tablo{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);
  overflow:hidden;margin-bottom:10px;}
.at-bas{display:grid;grid-template-columns:80px 1fr 1fr 1fr;
  padding:7px 12px;border-bottom:1px solid var(--bd);background:var(--s2);}
.at-hdr{font-size:8px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.at-hdr:first-child{text-align:left}
.at-satir{display:grid;grid-template-columns:80px 1fr 1fr 1fr;
  padding:9px 12px;border-bottom:1px solid var(--bd);transition:background .1s;}
.at-satir:last-child{border-bottom:none}
.at-satir.vurgu{background:var(--acl)}
.at-h{font-size:11px;font-weight:600;text-align:right;font-family:'DM Mono',monospace}
.at-h:first-child{text-align:left;font-family:'Syne',sans-serif;color:var(--tx2);font-size:10px}
.at-h.yesil{color:var(--g)}
.at-h.sari{color:var(--a)}

/* TAHSİLAT */
.tahsilat-ozet{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;}
.to-kutu{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;}
.to-lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:5px}
.to-val{font-size:13px;font-weight:800;font-family:'DM Mono',monospace}
.to-val.yesil{color:var(--g)}
.to-val.sari{color:var(--a)}
.to-val.kirmizi{color:var(--r)}

.fatura-listesi{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);overflow:hidden;margin-bottom:10px;}
.fl-bas{display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;border-bottom:1px solid var(--bd);background:var(--s2);}
.fl-title{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.fl-satir{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd);}
.fl-satir:last-child{border-bottom:none}
.fl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fl-bilgi{flex:1;min-width:0}
.fl-no{font-size:10px;font-family:'DM Mono',monospace;color:var(--tx3)}
.fl-tarih{font-size:11px;font-weight:600}
.fl-sag{text-align:right;flex-shrink:0}
.fl-tutar{font-size:12px;font-weight:800;font-family:'DM Mono',monospace}
.fl-durum{font-size:9px;padding:2px 7px;border-radius:4px;margin-top:2px;display:inline-block}
.odendi{background:var(--gl);color:var(--g)}
.bekliyor{background:var(--al);color:var(--a)}
.gecikti{background:var(--rl);color:var(--r)}

/* ÜRÜN ANALİZİ */
.urun-satir{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd);}
.urun-satir:last-child{border-bottom:none}
.us-ikon{width:32px;height:32px;border-radius:8px;background:var(--s3);
  display:grid;place-items:center;font-size:14px;flex-shrink:0;}
.us-bilgi{flex:1;min-width:0}
.us-ad{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.us-alt{font-size:10px;color:var(--tx3);margin-top:2px}
.us-sag{text-align:right;flex-shrink:0}
.us-tutar{font-size:12px;font-weight:800;font-family:'DM Mono',monospace;color:var(--g)}
.us-adet{font-size:9px;color:var(--tx3);margin-top:2px}

.kars-satir{margin-bottom:10px;}
.ks-row{display:flex;justify-content:space-between;margin-bottom:4px}
.ks-lbl{font-size:11px;font-weight:700}
.ks-vals{display:flex;gap:8px;font-size:10px;font-family:'DM Mono',monospace;}
.ks-bar-wrap{height:6px;background:var(--s3);border-radius:3px;position:relative}
.ks-bar-by{height:6px;border-radius:3px;background:var(--ac);position:absolute;top:0;left:0;transition:width .7s ease}
.ks-bar-gy{height:6px;border-radius:3px;background:var(--tx3);opacity:.4;position:absolute;top:0;left:0;transition:width .7s ease}

</head>

// ── YARDIMCILAR ──────────────────────────────────────────────────────────────
function para(n){if(!n&&n!==0)return'—';if(n>=1000000)return'₺'+(n/1000000).toFixed(1)+'M';if(n>=1000)return'₺'+Math.round(n/1000)+'K';return'₺'+Math.round(n).toLocaleString('tr-TR');}
function riskRenk(r){return r==='İYİ'?'var(--g)':r==='ORTA'?'var(--a)':'var(--r)';}
function riskBg(r){return r==='İYİ'?'var(--gl)':r==='ORTA'?'var(--al)':'var(--rl)';}
function durumSinif(d){return d==='ÖDENDİ'?'odendi':d==='GECİKTİ'?'gecikti':'bekliyor';}

let aktifCari=null;

// ── LİSTE ────────────────────────────────────────────────────────────────────
function renderListe(liste){
  document.getElementById('cariListesi').innerHTML = liste.map(c=>`
    <div class="cari-item" style="--renk:${c.renk}" onclick="cariAc('${c.id}')">
      <div class="ci-avatar" style="background:${c.renk}22;color:${c.renk}">${c.ad.charAt(0)}</div>
      <div class="ci-bilgi">
        <div class="ci-ad">${c.ad}</div>
        <div class="ci-alt">
          <span class="ci-tag" style="background:${c.renk}22;color:${c.renk}">${c.tip}</span>
          <span>${c.sehir}</span>
        </div>
      </div>
      <div class="ci-sag">
        <div class="ci-ciro">${para(c.ozet.bu_yil_ciro)}</div>
        <div class="ci-risk" style="background:${riskBg(c.risk)};color:${riskRenk(c.risk)}">${c.risk}</div>
      </div>
    </div>`).join('');
}

function cariFiltrele(q){
  const liste = q ? CARILER.filter(c=>c.ad.toLowerCase().includes(q.toLowerCase())||c.tip.toLowerCase().includes(q.toLowerCase())) : CARILER;
  renderListe(liste);
}

// ── DETAY ────────────────────────────────────────────────────────────────────
function cariAc(id){
  aktifCari = CARILER.find(c=>c.id===id);
  if(!aktifCari) return;
  const c = aktifCari;

  document.getElementById('dhAd').textContent = c.ad;
  document.getElementById('dhAlt').textContent = `${c.tip} · ${c.sehir}`;
  document.getElementById('dhRisk').textContent = c.risk;
  document.getElementById('dhRisk').style.background = riskBg(c.risk);
  document.getElementById('dhRisk').style.color = riskRenk(c.risk);

  // Tüm sekmeleri render et
  renderOzet(c);
  renderAylik(c);
  renderTahsilat(c);
  renderUrunler(c);
  renderKarsilastirma(c);

  // İlk sekmeye dön
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('aktif',i===0));
  document.querySelectorAll('.sekme').forEach((s,i)=>s.classList.toggle('aktif',i===0));
  document.getElementById('detayScroll').scrollTop=0;

  document.getElementById('detayEkran').classList.add('aktif');
}

function geriGit(){
  document.getElementById('detayEkran').classList.remove('aktif');
}

function sekme(id,btn){
  document.querySelectorAll('.sekme').forEach(s=>s.classList.remove('aktif'));
  document.getElementById('t-'+id).classList.add('aktif');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  document.getElementById('detayScroll').scrollTop=0;
}

    <div class="ozet-banner">

        <div class="kart-bas">Ort. Sepet</div>

      <div style="font-size:10px;color:var(--tx3);margin-top:4px">Açık borç yok</div>

  `;
}

// ── TAHSİLAT ─────────────────────────────────────────────────────────────────
function renderTahsilat(c){
  const toplamFatura=c.faturalar.reduce((t,f)=>t+f.tutar,0);
  const toplamOdenen=c.faturalar.reduce((t,f)=>t+f.odenen,0);
  const bekleyen=toplamFatura-toplamOdenen;
  const gecikti=c.faturalar.filter(f=>f.durum==='GECİKTİ').reduce((t,f)=>t+(f.tutar-f.odenen),0);

  document.getElementById('t-tahsilat').innerHTML=`
    <div class="tahsilat-ozet">
      <div class="to-kutu">
        <div class="to-lbl">Toplam</div>
        <div class="to-val">${para(toplamFatura)}</div>
      </div>
      <div class="to-kutu">
        <div class="to-lbl">Tahsil</div>
        <div class="to-val yesil">${para(toplamOdenen)}</div>
      </div>
      <div class="to-kutu">
        <div class="to-lbl">Bekleyen</div>
        <div class="to-val ${bekleyen>0?'kirmizi':''}">${bekleyen>0?para(bekleyen):'—'}</div>
      </div>
    </div>

    ${gecikti>0?`<div class="kart" style="border-color:rgba(239,68,68,0.25);margin-bottom:10px">
      <div class="kart-bas" style="color:var(--r)">⚠ Geciken Tahsilat</div>
      <div style="font-size:22px;font-weight:800;color:var(--r);font-family:'DM Mono',monospace">${para(gecikti)}</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px">Acil takip gerekiyor</div>
    </div>`:''}

    <div class="bolum-bas">Fatura Detayı</div>
    <div class="fatura-listesi">
      <div class="fl-bas">
        <div class="fl-title">Son Faturalar</div>
        <div style="font-size:11px;font-weight:700;color:var(--tx2)">${c.faturalar.length} fatura</div>
      </div>
      ${c.faturalar.map(f=>`
        <div class="fl-satir">
          <div class="fl-dot" style="background:${f.durum==='ÖDENDİ'?'var(--g)':f.durum==='GECİKTİ'?'var(--r)':'var(--a)'}"></div>
          <div class="fl-bilgi">
            <div class="fl-no">${f.no} · Vade: ${f.vade} gün</div>
            <div class="fl-tarih">${f.tarih}</div>
          </div>
          <div class="fl-sag">
            <div class="fl-tutar">${para(f.tutar)}</div>
            <div class="fl-durum ${durumSinif(f.durum)}">${f.durum}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ── KARŞILAŞTIRMA ─────────────────────────────────────────────────────────────
function renderKarsilastirma(c){
  const o=c.ozet;
  const maxCiro=Math.max(o.bu_yil_ciro, o.gecen_yil_ciro);
  const aylar=c.aylik.filter(a=>a.ciro>0||a.gecen_yil_ciro>0);
  const maxAy=Math.max(...aylar.map(a=>Math.max(a.ciro,a.gecen_yil_ciro)));

  document.getElementById('t-karsilastirma').innerHTML=`
    <div class="kart">
      <div class="kart-bas">Yıllık Ciro Karşılaştırması</div>
      <div class="kars-satir">
        <div class="ks-row">
          <div class="ks-lbl" style="color:var(--ac)">Bu Yıl</div>
          <div class="ks-vals"><span style="color:var(--ac)">${para(o.bu_yil_ciro)}</span></div>
        </div>
        <div class="ks-bar-wrap">
          <div class="ks-bar-by" id="bar-by" style="width:0%"></div>
        </div>
      </div>
      <div class="kars-satir" style="margin-top:8px">
        <div class="ks-row">
          <div class="ks-lbl" style="color:var(--tx3)">Geçen Yıl</div>
          <div class="ks-vals"><span style="color:var(--tx3)">${para(o.gecen_yil_ciro)}</span></div>
        </div>
        <div class="ks-bar-wrap">
          <div class="ks-bar-gy" id="bar-gy" style="width:0%"></div>
        </div>
      </div>
    </div>

    <div class="bolum-bas">Aylık Karşılaştırma</div>
    <div class="aylik-tablo">
      <div class="at-bas">
        <div class="at-hdr">Ay</div>
        <div class="at-hdr">Bu Yıl</div>
        <div class="at-hdr">G. Yıl</div>
        <div class="at-hdr">Fark</div>
      </div>
      ${c.aylik.map(a=>{
        const fark=a.ciro-a.gecen_yil_ciro;
        const aktif=a.ciro>0||a.gecen_yil_ciro>0;
        if(!aktif) return '';
        return`<div class="at-satir">
          <div class="at-h">${a.ay}</div>
          <div class="at-h ${a.ciro>0?'yesil':''}">${a.ciro>0?para(a.ciro):'—'}</div>
          <div class="at-h" style="color:var(--tx3)">${para(a.gecen_yil_ciro)}</div>
          <div class="at-h" style="color:${fark>=0?'var(--g)':'var(--r)'}">${fark>=0?'+':''}${para(fark)}</div>
        </div>`;
      }).join('')}
    </div>`;

  // Animasyon
  setTimeout(()=>{
    const byEl=document.getElementById('bar-by');
    const gyEl=document.getElementById('bar-gy');
    if(byEl) byEl.style.width=Math.round(o.bu_yil_ciro/maxCiro*100)+'%';
    if(gyEl) gyEl.style.width=Math.round(o.gecen_yil_ciro/maxCiro*100)+'%';
  },100);
}
