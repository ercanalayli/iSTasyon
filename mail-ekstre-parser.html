<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mail Ekstre Parser</title><script src="assets/aperion-v69-yapikredi-parser.js?v=69"></script><style>body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0;padding:20px;color:#111}.wrap{max-width:1100px;margin:auto}.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:12px}button,a{background:#2563eb;color:#fff;border:0;border-radius:8px;padding:10px 12px;text-decoration:none;font-weight:700;display:inline-block;margin:4px;cursor:pointer}textarea{width:100%;height:180px;border:1px solid #ccc;border-radius:10px;padding:10px;font-family:monospace}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.k{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px}.k b{font-size:22px;display:block}.r{display:grid;grid-template-columns:90px 1fr 110px 110px 110px;border-bottom:1px solid #eee;padding:8px 0;font-size:12px;gap:8px}.h{font-weight:700}pre{background:#0f172a;color:#e2e8f0;padding:12px;border-radius:10px;max-height:260px;overflow:auto}</style></head><body><div class="wrap"><div class="card"><h2>Mail Ekstre Parser</h2><a href="index.html">Ana Ekran</a><a href="mail-ekstre-canli.html">Canlı Merkez</a><button onclick="seed()">Seed Yükle</button><button onclick="parseIt()">Metni Parse Et</button></div><div class="card"><textarea id="t" placeholder="Yapı Kredi ekstre metni..."></textarea></div><div class="card"><div class="grid"><div class="k"><b id="p">0</b>Pending</div><div class="k"><b id="d">0</b>Mükerrer</div><div class="k"><b id="i">0</b>Giriş</div><div class="k"><b id="o">0</b>Çıkış</div><div class="k"><b id="n">0</b>Net</div></div></div><div class="card"><div class="r h"><div>Tarih</div><div>Açıklama</div><div>Giriş</div><div>Çıkış</div><div>Tip</div></div><div id="rows"></div></div><div class="card"><pre id="j">Hazır.</pre></div></div><script>let payload=null;function tl(x){return Number(x||0).toLocaleString('tr-TR',{minimumFractionDigits:2})}async function seed(){let r=await fetch('data/pending-bank-movements-yapikredi-20260601.json?v='+Date.now());payload=await r.json();draw()}function parseIt(){payload=AperiONYapiKrediParser.toPendingPayload(document.getElementById('t').value,{company_id:'alayli',mail_subject:'Hesap_Ozeti_20260601_000508070',attachment_name:'ekstre.pdf'});draw()}function draw(){let rows=payload.rows||[],tin=0,tout=0,dup=0;rows.forEach(x=>{tin+=+x.amount_in||0;tout+=+x.amount_out||0;if(x.status==='duplicate_candidate')dup++});p.textContent=rows.length-dup;d.textContent=dup;i.textContent=tl(tin);o.textContent=tl(tout);n.textContent=tl(tin-tout);document.getElementById('rows').innerHTML=rows.map(x=>'<div class="r"><div>'+x.transaction_date+'</div><div>'+x.description+'<br><small>'+x.duplicate_key+'</small></div><div>'+tl(x.amount_in)+'</div><div>'+tl(x.amount_out)+'</div><div>'+x.detected_type+'</div></div>').join('');j.textContent=JSON.stringify(payload,null,2)}seed()</script></body></html>
