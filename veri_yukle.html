<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AperiON Veri Yükle</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

</head>
<body style="background:#0b0f19;color:white;font-family:Arial;padding:20px">

<h2>AperiON Veri Yükle</h2>

<input type="file" id="fileInput" />
<br><br>

<button onclick="dosyaOku()">Analiz Et</button>
<button onclick="yukle()">Supabase'e Yükle</button>

<pre id="log"></pre>

<script>

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://iilfwosoroflzubkaryj.supabase.co",
  "sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW"
);

let parsed = [];
let dataType = "sales";

// LOG
function log(t){
  document.getElementById("log").innerText += "\\n" + t;
}

// 📂 DOSYA OKU
function dosyaOku(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){ log("Dosya seç"); return; }

  if(file.name.toLowerCase().includes("musteri")){
    dataType = "customers";
  }else{
    dataType = "sales";
  }

  const reader = new FileReader();
  reader.onload = (e)=>{
    const wb = XLSX.read(e.target.result, {type:"array"});

    if(dataType==="customers"){
      parsed = parseCustomers(wb);
    }else{
      parsed = parseSales(wb);
    }

    log("Parsed: " + parsed.length);
  };
  reader.readAsArrayBuffer(file);
}

// 👥 CUSTOMER PARSER
function parseCustomers(wb){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws,{header:1});

  const h = data[0].map(x=>String(x).toLowerCase());

  const find = k => h.findIndex(x=>x.includes(k));

  const iKod = find("kod");
  const iUnvan = find("unvan");

  const rows = [];

  for(let i=1;i<data.length;i++){
    const r = data[i];
    if(!r || r.length===0) continue;

    rows.push({
      cari_kod: r[iKod] || "",
      cari_unvan: r[iUnvan] || ""
    });
  }

  return rows;
}

// 💰 SALES PARSER
function parseSales(wb){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws,{header:1});

  const rows = [];

  for(let i=1;i<data.length;i++){
    const r = data[i];
    if(!r || r.length===0) continue;

    rows.push({
      urun: r[0] || "",
      adet: Number(r[1]) || 1,
      ciro: Number(r[2]) || 0
    });
  }

  return rows;
}

// 🚀 YÜKLE
async function yukle(){

  if(parsed.length===0){
    log("Veri yok");
    return;
  }

  const { data:userData } = await supabase.auth.getUser();
  const user = userData.user;

  if(!user){
    log("Login ol");
    return;
  }

  const { data:profile } = await supabase
    .from("aperion_users")
    .select("company_id")
    .eq("id", user.id)
    .single();

  const company_id = profile.company_id;

  const table = dataType==="customers" ? "customers" : "sales_raw";

  const payload = parsed.map(x=>({
    ...x,
    company_id
  }));

  const { error } = await supabase
    .from(table)
    .insert(payload);

  if(error){
    log("Hata: " + error.message);
  }else{
    log("Yüklendi ✅");
  }
}

</script>

</body>
</html>
