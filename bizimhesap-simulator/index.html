<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BizimHesap Simülatörü</title><link rel="stylesheet" href="styles.css"></head><body>
<header><p>APERİON İSTASYON</p><h1>BizimHesap Simülatörü</h1><span>Gerçek hesaba yazmadan önce kayıt ön izlemesi</span></header><main>
<section class="panel"><h2>İşlem bilgileri</h2><form id="form">
<label>İşlem türü<select name="type"><option value="bank_movement">Banka hareketi</option><option value="pos_to_bank_transfer">POS → banka transferi</option></select></label><label>Kayıt niteliği<select name="kind"><option value="transfer">Transfer</option><option value="collection">Tahsilat</option></select></label>
<label>Tutar<input name="amount" type="number" min="0.01" step="0.01" required></label><label>Kaynak hesap<input name="sourceAccount" placeholder="POS POS POS KREDİ KARTI"></label><label>Hedef hesap<input name="targetAccount" placeholder="VAKIFBANK"></label>
<label>Ekstre/dosya kaynağı<input name="evidenceSource" required placeholder="vakifbank-ekstre.xlsx"></label><label>Kanıt hash/referansı<input name="evidenceHash" required placeholder="sha256:..."></label><label>Tekil işlem anahtarı<input name="idempotencyKey" required placeholder="banka-ref-123"></label>
<label>Emanet hesabı<select name="waitingAccount"><option value="">Emanet değil</option><option value="emanet_banka">Emanet Banka</option><option value="emanet_kasa">Emanet Kasa</option><option value="emanet_cari">Emanet Cari</option><option value="emanet_transfer_pos">Emanet Transfer/POS</option><option value="emanet_diger">Emanet Diğer</option></select></label>
<fieldset id="waiting"><legend>Emanet çözüm bilgileri</legend><label>Neden<input name="reason"></label><label>Aday gerçek hesap<input name="candidateAccount"></label><label>Sorumlu<input name="owner" value="Ercan"></label><label>Çözüm tarihi<input name="resolveBy" type="date"></label></fieldset><button type="submit">Kaydı simüle et</button></form></section>
<section class="panel result"><h2>BizimHesap ön izlemesi</h2><div id="status" class="idle">Henüz simülasyon yapılmadı.</div><dl id="preview"></dl><button id="approve" hidden>Onay kuyruğuna hazırla</button><p class="guard">Bu ekran BizimHesap'a canlı kayıt göndermez.</p></section></main><script type="module" src="app.js"></script></body></html>
