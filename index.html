<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>ERPALTH Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      padding: 20px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

<h1>📊 ERPALTH Dashboard</h1>

<div class="card">
  <h2>📅 Günlük Ciro</h2>
  <canvas id="ciroChart"></canvas>
</div>

<div class="card">
  <h2>📦 Kategori Dağılımı</h2>
  <canvas id="kategoriChart"></canvas>
</div>

<script>
const SUPABASE_URL = "https://iilfwosoroflzubkaryj.supabase.co";
const SUPABASE_KEY = "sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW";

async function getData() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/sales_raw?select=*`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );
  return res.json();
}

async function init() {
  const data = await getData();

  // Günlük ciro
  const ciroMap = {};
  data.forEach(row => {
    if (!ciroMap[row.tarih]) ciroMap[row.tarih] = 0;
    ciroMap[row.tarih] += Number(row.ciro);
  });

  const dates = Object.keys(ciroMap);
  const ciro = Object.values(ciroMap);

  new Chart(document.getElementById("ciroChart"), {
    type: "line",
    data: {
      labels: dates,
      datasets: [{
        label: "Ciro",
        data: ciro
      }]
    }
  });

  // Kategori dağılımı
  const kategoriMap = {};
  data.forEach(row => {
    if (!kategoriMap[row.kategori]) kategoriMap[row.kategori] = 0;
    kategoriMap[row.kategori] += Number(row.ciro);
  });

  new Chart(document.getElementById("kategoriChart"), {
    type: "bar",
    data: {
      labels: Object.keys(kategoriMap),
      datasets: [{
        label: "Kategori",
        data: Object.values(kategoriMap)
      }]
    }
  });
}

init();
</script>

</body>
</html>
