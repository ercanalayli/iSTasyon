<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ALAYLI Fiyat Sevkiyat</title><style>body{margin:0;background:#edf3fb;font-family:Arial;color:#0f172a}.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{background:#0f172a;color:#fff;padding:18px}.brand{font-weight:900;margin-bottom:24px}.nav div{padding:13px;border-radius:12px;margin:8px 0;font-weight:900;cursor:pointer}.nav .on{background:#2454e6}.main{padding:22px}.top{display:flex;justify-content:space-between}.stamp{background:#111827;color:#fff;border-radius:14px;padding:10px 14px;font-weight:900;text-align:center}.stamp small{display:block;color:#cbd5e1;font-size:10px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.metric,.card,.detail{background:#fff;border:1px solid #dbe3ef;border-radius:18px;padding:14px;box-shadow:0 12px 34px #0001}.metric small{font-weight:900;color:#64748b}.metric b{display:block;font-size:24px;margin-top:5px}.layout{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.alarm{background:#111827;color:#fff;border-radius:22px;padding:18px;margin-bottom:12px}.big{font-size:30px;font-weight:900}.row{display:grid;grid-template-columns:1.1fr .8fr .6fr .7fr auto;gap:8px;align-items:center;background:#f8fafc;border:1px solid #e8eef7;border-radius:14px;padding:11px;margin-top:8px;cursor:pointer}.row:hover{outline:3px solid #2563eb33}.open{background:#fff1f2;border-color:#fecdd3}.pill{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.red{background:#fee2e2;color:#991b1b}.green{background:#dcfce7;color:#166534}.blue{background:#dbeafe;color:#1d4ed8}.yellow{background:#fef3c7;color:#92400e}.money{font-weight:900;color:#047857}.detail{border:3px solid #111827;position:sticky;top:16px}.boxgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.box{background:#f8fafc;border:1px solid #e8eef7;border-radius:12px;padding:9px}.total{font-size:28px;font-weight:900;color:#047857}.hide{display:none}@media(max-width:1000px){.app,.layout,.metrics,.row,.top{display:block}.side{display:none}.detail{position:static}.metric{margin-bottom:8px}}</style></head><body><div class="app"><aside class="side"><div class="brand">ALAYLI Medikal<br><small>AperiON Kontrol</small></div><div class="nav"><div class="on" onclick="tab('dash',this)">Dashboard</div><div onclick="tab('sevk',this)">Proforma + Sevkiyat</div><div onclick="tab('urun',this)">Urun Master</div><div onclick="tab('alis',this)">Alis Gecmisi</div><div onclick="tab('kural',this)">Kurallar</div><div onclick="tab('uyari',this)">Uyarilar</div></div></aside><main class="main"><div class="top"><div><h1 id="ttl">ALAYLI Fiyat & Sevkiyat Ana Kontrol Merkezi</h1><p id="sub">Tek ana ekran. Acik sevkiyat, fatura, proforma, alis, kar ve risk burada.</p></div><div class="stamp"><small>GUNCELLEME KODU</small><span id="kod">----</span></div></div><div id="met" class="metrics"></div><div class="layout"><section id="left"></section><aside><div id="det" class="detail"></div></aside></div></main></div><script>
const O={c:'Ada Tibbi Malzeme / Murat Coban',u:'Jender normal emici kulot Medium 30lu',s:'Jender kulot M',m:'15 balya / 60 paket',p:'60 paket',l:'Mayis',isk:'%7 uygulanmis',har:'461,6928 TL',dah:'472,3117 TL',mal:'25.762,46 TL',kdv:'2.576,25 TL',top:'28.338,70 TL'};
const S=[['Kent Medikal','Lorina mesane pedi 30lu','12 paket','5.217,70 TL','Mayis','Yok'],['Kent Medikal','Lorina baglama L 30lu','20 paket','13.132,64 TL','Nisan','Yok'],['Kent Medikal','Lorina baglama XL 30lu','20 paket','13.713,08 TL','Nisan','Yok'],['Kent Medikal','Lorina kulot L 30lu','20 paket','11.582,34 TL','Nisan','Yok'],['Kent Medikal','Lorina kulot M 30lu','8 paket','4.945,42 TL','Nisan','Yok'],['Kent Medikal','Jender kulot L 30lu','20 paket','9.650,52 TL','Nisan','Yok'],['Kent Medikal','Jender kulot M 30lu','8 paket','3.497,65 TL','Nisan','Yok'],['Kent Medikal','Jender 60x90 serme 30lu','60 paket','11.669,22 TL','Nisan','Yok'],['Ada eski sevkiyat','Jender kulot XL 30lu','120 paket','66.145,94 TL','Mayis','%11'],['Ada eski sevkiyat','Jender kulot L 30lu','80 paket','39.908,05 TL','Mayis','%11'],['Ada eski sevkiyat','Lorina mesane pedi 30lu','12 paket','4.852,46 TL','Mayis','%7'],['Gorsa Medikal','Lorina mesane pedi 30lu','12 paket','5.217,72 TL','Mayis','Yok'],['Feyza Medikal','Lorina mesane pedi 30lu','12 paket','4.852,44 TL','Mayis','%7'],['Sifam Medikal','Lorina mesane pedi 30lu','12 paket','4.852,46 TL','Mayis','%7'],['Isik Medikal','Jender baglama L 30lu','8 paket','3.594,54 TL','Nisan','Yok'],['Isik Medikal','Jender XXL 20li','8 paket','4.249,43 TL','Nisan','Yok']];
const A=[['Lorina mesane pedi 30lu','316,22 TL','IHK202600000003','%20 + %10 + %20'],['Lorina baglama L 30lu','470,78 TL','IST202600000080','%20 + %15 + %10 + %15'],['Lorina baglama XL 30lu','491,59 TL','IST202600000080','%20 + %15 + %10 + %15'],['Lorina kulot L 30lu','481,19 TL','IST202600000080','%20 + %15 + %10 + %15'],['Lorina kulot M 30lu','443,21 TL','IST202600000080','%20 + %15 + %10 + %15'],['Jender kulot L 30lu','400,16 TL','IST202600000080','%20 + %15 + %10 + %15 + %15'],['Jender kulot M 30lu','362,58 TL','IST202600000080','%20 + %15 + %10 + %15 + %15'],['Jender kulot XL 30lu','442,17 TL','IST202600000080','%20 + %15 + %10 + %15 + %15'],['Jender 60x90 serme 30lu','102,39 TL','IST2025000001640','%21 + %15,95 + %10,75 + %13,29 + %9,84'],['Jender baglama L 30lu','364,35 TL','IST202600000080','%20 + %15 + %10 + %15 + %15'],['Jender XXL 20li','374,49 TL','IST202600000084','%10 + %10 + %15 + %15']];
function c(n){return String(n).padStart(2,'0')}function code(){let d=new Date();kod.textContent=c(d.getHours())+c(d.getMinutes())+String(d.getFullYear()).slice(-2)+c(d.getDate())+c(d.getMonth()+1)}
function m(a,b,s){return `<div class=metric><small>${a}</small><b>${b}</b><span>${s}</span></div>`}function r(a,b,c,d,e,cls='green',fn='') {return `<div class="row ${cls==='red'?'open':''}" onclick="${fn}"><b>${a}</b><span>${b}</span><span>${c}</span><span class=money>${d}</span><span class="pill ${cls}">${e}</span></div>`}
function nav(x){document.querySelectorAll('.nav div').forEach(v=>v.classList.remove('on'));x&&x.classList.add('on')}function tab(t,x){nav(x);({dash,sevk,urun,alis,kural,uyari})[t]()}function base(a,b){ttl.textContent=a;sub.textContent=b}
function metrics(show=true){met.className=show?'metrics':'hide';if(show)met.innerHTML=m('Toplam paket','492','432 kapali + 60 acik')+m('KDV dahil satis','235.785,55 TL','kapali + acik')+m('Fatura bekleyen','1','Ada yeni siparis')+m('Alarm','VAR','kapanmamis sevkiyat')}
function openRow(){return r('Ada Tibbi Malzeme',O.s,O.p,O.top,'Fatura kes','red','ada()')}function closedRows(){return S.map((x,i)=>r(x[0],x[1],x[2],x[3],'Kapali','green',`done(${i})`)).join('')}
function dash(){base('ALAYLI Fiyat & Sevkiyat Ana Kontrol Merkezi','Tek ana ekran. Acik sevkiyat, fatura, proforma, alis, kar ve risk burada.');metrics(true);left.innerHTML=`<div class=alarm onclick=ada()><span class="pill red">ALARM - FATURA KESILECEK</span><h2>Ada Tibbi Malzeme</h2><div class=big>${O.s} - ${O.m}</div><p>${O.l} liste | ${O.isk} | fatura bekliyor</p></div><div class=card><h2>Tiklanabilir sevkiyatlar</h2>${openRow()}${closedRows()}</div>`;ada()}
function sevk(){base('Proforma + Sevkiyat','Tum sevkiyat satirlari ve acik fatura alarmi.');metrics(false);left.innerHTML=`<div class=card><h2>Acik sevkiyat</h2>${openRow()}</div><div class=card><h2>Kapanan sevkiyatlar</h2>${closedRows()}</div>`;ada()}
function urun(){base('Urun Master','Urun, liste kaynagi, iskonto ve durum.');metrics(false);let list=[...new Set([O.u,...S.map(x=>x[1])])];left.innerHTML='<div class=card><h2>Urun Master</h2>'+list.map(u=>r(u,u.includes('Jender')?'Jender':'Lorina','Aktif','Liste kontrol','Urun','blue')).join('')+'</div>';det.innerHTML='<h2>Urun Master</h2><p>Nisan ve Mayis fiyat kaynaklari ayri tutulur.</p>'}
function alis(){base('Alis Gecmisi','Son sevkiyatta kullanilan alis kaynaklari eksiksiz burada.');metrics(false);left.innerHTML='<div class=card><h2>Alis kaynaklari</h2>'+A.map(a=>r(a[0],'Net alis: '+a[1],a[2],a[3],'Kaynak','blue')).join('')+'</div>';det.innerHTML='<h2>Alis Gecmisi</h2><p>Kar hesaplari bu net alis ve kaynak fatura ile eslesir. Kaynak yoksa satir kapanmaz.</p>'}
function kural(){base('Kurallar','Kaynak kilidi ve kapanis kurallari.');metrics(false);left.innerHTML='<div class=card><h2>Kurallar</h2>'+r('Nisan kaynak','15-30 Nisan PDF','Kilitli','Karismayacak','OK','green')+r('Mayis kaynak','Kardag Mayis Excel','Kilitli','Karismayacak','OK','green')+r('Fatura yoksa','Sevkiyat acik','Alarm','Yesile donmez','Zorunlu','red')+r('Yuvarlama farki','Kullanici onayi','Log','Sonra kapanir','Kontrol','yellow')+'</div>';det.innerHTML='<h2>Kural</h2><p>Fatura yuklenmeden acik sevkiyat kapanmaz.</p>'}
function uyari(){base('Uyarilar','Acil kapanmamis sevkiyatlar.');metrics(false);left.innerHTML=`<div class=alarm onclick=ada()><span class="pill red">ACIL UYARI</span><h2>Ada Tibbi Malzeme</h2><div class=big>Fatura bekliyor</div><p>${O.top} acik sevkiyat kapanmadi.</p></div><div class=card>${openRow()}</div>`;ada()}
function ada(){det.innerHTML=`<span class="pill red">FATURA KESILECEK</span><h2>${O.c}</h2><div class=boxgrid><div class=box><b>Durum</b><br>Acik</div><div class=box><b>Fatura</b><br>Yuklenmedi</div><div class=box><b>Sevkiyat</b><br>Tamamlanmadi</div><div class=box><b>Kontrol</b><br>Hesaplandi</div></div><p><b>Urun:</b> ${O.u}</p><p><b>Miktar:</b> ${O.m}</p><p><b>Liste:</b> ${O.l}</p><p><b>KDV haric paket:</b> ${O.har}</p><p><b>Iskonto:</b> ${O.isk}</p><p><b>KDV dahil paket:</b> ${O.dah}</p><p><b>Mal hizmet:</b> ${O.mal}</p><p><b>KDV:</b> ${O.kdv}</p><div class=total>${O.top}</div>`}
function done(i){let x=S[i];det.innerHTML=`<span class="pill green">KAPALI</span><h2>${x[0]}</h2><p><b>Urun:</b> ${x[1]}</p><p><b>Paket:</b> ${x[2]}</p><p><b>Liste:</b> ${x[4]}</p><p><b>Iskonto:</b> ${x[5]}</p><p><b>Toplam:</b> ${x[3]}</p><p>Bu sevkiyat kapanmis. Fatura alarminda degil.</p>`}
code();dash();setInterval(code,30000)</script></body></html>
