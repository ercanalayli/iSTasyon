<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AperiON Veri Durumu v2</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;background:#F4F6FA;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#101828}.wrap{max-width:1100px;margin:auto;padding:16px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.top h1{margin:0;font-size:24px}.top p{margin:4px 0 0;color:#667085;font-weight:750;font-size:13px}.btn{border:1px solid #B2CCFF;background:#EEF4FF;color:#1D4ED8;border-radius:12px;padding:10px 13px;font-weight:950;font-size:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:#fff;border:1px solid #E4E7EC;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.08);padding:16px}.l{font-size:11px;color:#667085;font-weight:950;margin-bottom:8px}.v{font-size:24px;font-weight:950;color:var(--c,#1D4ED8)}.s{font-size:12px;color:#667085;font-weight:750;margin-top:8px}.ok{--c:#059669}.warn{--c:#D97706}.bad{--c:#DC2626}.info{--c:#1D4ED8}.main{grid-column:1/-1;border-width:2px}.main .v{font-size:34px}.box{background:#fff;border:1px solid #E4E7EC;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.08);margin-top:12px;overflow:hidden}.hd{padding:14px 16px;border-bottom:1px solid #E4E7EC;background:#FBFCFE;font-weight:950}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid #E4E7EC;font-size:13px}.row:last-child{border-bottom:0}.k{color:#667085;font-weight:850}.rv{font-weight:950;text-align:right}.foot{margin-top:12px;color:#667085;font-size:12px;font-weight:750}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{display:block}.btn{margin-top:10px}}@media(max-width:520px){.grid{grid-template-columns:1fr}.main .v{font-size:28px}}</style></head><body><div class="wrap"><div class="top"><div><h1>AperiON Veri Durumu</h1><p>Tek bakış: klon, bugün, dün, son satış.</p></div><button class="btn" onclick="loadAll()">Yenile</button></div><div class="grid" id="cards"></div><div class="box"><div class="hd">Kontrol Detayı</div><div id="detail"></div></div><div class="foot">Bu ekran doğrudan canlı Supabase satış verisini ve BizimHesap Klonu status kaydını okur.</div></div><script>const SU='https://iilfwosoroflzubkaryj.supabase.co';const SK='sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW';const db=supabase.createClient(SU,SK);const FIRMA='alayli';const fmt=n=>Number(n||0).toLocaleString('tr-TR');const money=n=>'TL '+Math.round(Number(n||0)).toLocaleString('tr-TR');const iso=d=>d.toISOString().slice(0,10);const dt=v=>v?new Date(v).toLocaleString('tr-TR'):'veri yok';function card(l,v,s,cls,main=false){return `<div class="card ${cls} ${main?'main':''}"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`}function row(k,v){return `<div class="row"><span class="k">${k}</span><span class="rv">${v}</span></div>`}async function rows(day){const {data,error}=await db.from('sales_raw').select('ciro,adet,tarih,created_at').eq('firma_id',FIRMA).eq('tarih',day).limit(50000);if(error)throw error;return data||[]}async function latestSale(){const {data,error}=await db.from('sales_raw').select('tarih,created_at').eq('firma_id',FIRMA).order('created_at',{ascending:false}).limit(1);if(error)throw error;return data&&data[0]?data[0]:null}async function cloneStatus(){try{const {data,error}=await db.from('bot_sync_status_latest').select('*').eq('company',FIRMA).eq('bot_name','bizimhesap_klonu').limit(1);if(error)return null;return data&&data[0]?data[0]:null}catch(e){return null}}function sum(a){return a.reduce((x,r)=>({ciro:x.ciro+Number(r.ciro||0),adet:x.adet+Number(r.adet||0)}),{ciro:0,adet:0})}function verdict(age,clone,todayCount,last){if(clone&&clone.status==='failed')return['KLON HATA','BizimHesap Klonu hata verdi','bad'];if(!last)return['VERİ YOK','Satış tablosunda kayıt bulunamadı','bad'];if(age>180)return['VERİ ESKİ','Son veri 3 saatten eski','bad'];if(age>75)return['KONTROL GEREKLİ','Son veri 75 dakikadan eski','warn'];if(todayCount===0)return['BUGÜN SATIŞ YOK','Klon güncel ama bugün işlem görünmüyor','warn'];return['SİSTEM GÜNCEL','Klon ve satış verisi normal görünüyor','ok']}async function loadAll(){document.getElementById('cards').innerHTML=card('Durum','Yükleniyor','Canlı veri okunuyor','info',true);try{const now=new Date(),today=iso(now),y=new Date(now);y.setDate(y.getDate()-1);const yesterday=iso(y);const [tr,yr,last,clone]=await Promise.all([rows(today),rows(yesterday),latestSale(),cloneStatus()]);const ts=sum(tr),ys=sum(yr);const lastTime=last&&last.created_at?new Date(last.created_at):null;const cloneTime=clone&&(clone.last_success_at||clone.finished_at)?new Date(clone.last_success_at||clone.finished_at):null;const base=cloneTime||lastTime;const age=base?Math.round((Date.now()-base.getTime())/60000):999999;const v=verdict(age,clone,tr.length,last);document.getElementById('cards').innerHTML=card('ANA KONTROL',v[0],v[1],v[2],true)+card('Klon Senkronu',cloneTime?dt(cloneTime):'status yok',clone?`${clone.status||'-'} · ${clone.message||''}`:'sales_raw zamanına bakılıyor',clone&&clone.status==='failed'?'bad':age<=75?'ok':age<=180?'warn':'bad')+card('Bugün Satış',money(ts.ciro),`${fmt(ts.adet)} adet · ${fmt(tr.length)} işlem`,tr.length?'ok':'warn')+card('Dün Satış',money(ys.ciro),`${fmt(ys.adet)} adet · ${fmt(yr.length)} işlem`,yr.length?'ok':'warn')+card('Son Satış Tarihi',last?last.tarih:'yok',lastTime?dt(lastTime):'kayıt yok','info');document.getElementById('detail').innerHTML=row('Bugün tarihi',today)+row('Dün tarihi',yesterday)+row('Son klon senkronu',cloneTime?dt(cloneTime):'status bekleniyor')+row('Klon durumu',clone?clone.status:'status kaydı yok')+row('Son veri kayıt zamanı',lastTime?dt(lastTime):'yok')+row('Son satış tarihi',last?last.tarih:'yok')+row('Bugün işlem',fmt(tr.length))+row('Dün işlem',fmt(yr.length))+row('Ana yorum',v[0]+' - '+v[1]);}catch(e){document.getElementById('cards').innerHTML=card('ANA KONTROL','VERİ OKUNAMADI',e.message,'bad',true);document.getElementById('detail').innerHTML=row('Hata',e.message)}}loadAll();setInterval(loadAll,60000);</script></body></html>
