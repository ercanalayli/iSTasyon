<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AperiON Veri Durumu</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--bg:#F4F6FA;--card:#fff;--line:#E4E7EC;--text:#101828;--muted:#667085;--green:#059669;--red:#DC2626;--orange:#D97706;--blue:#1D4ED8;--shadow:0 12px 30px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}.wrap{max-width:1100px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.top h1{margin:0;font-size:24px}.top p{margin:4px 0 0;color:var(--muted);font-weight:750;font-size:13px}.btn{border:1px solid #B2CCFF;background:#EEF4FF;color:#1D4ED8;border-radius:12px;padding:10px 13px;font-weight:950;font-size:12px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px}.card .l{font-size:11px;color:var(--muted);font-weight:950;margin-bottom:8px}.card .v{font-size:24px;font-weight:950;color:var(--c,var(--blue))}.card .s{font-size:12px;color:var(--muted);font-weight:750;margin-top:8px}.ok{--c:var(--green)}.warn{--c:var(--orange)}.bad{--c:var(--red)}.info{--c:var(--blue)}.box{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);margin-top:12px;overflow:hidden}.hd{padding:14px 16px;border-bottom:1px solid var(--line);background:#FBFCFE;font-weight:950}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px}.row:last-child{border-bottom:0}.k{color:var(--muted);font-weight:850}.v{font-weight:950}.foot{margin-top:12px;color:var(--muted);font-size:12px;font-weight:750;line-height:1.5}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{display:block}.top .btn{display:inline-block;margin-top:10px}}@media(max-width:520px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>AperiON Veri Durumu</h1><p>BizimHesap Klonu, bugün / dün satış ve son veri kontrolü.</p></div><button class="btn" onclick="loadAll()">Yenile</button></div><div class="grid" id="cards"></div><div class="box"><div class="hd">Kontrol Detayı</div><div id="detail"></div></div><div class="foot">Bu ekran canlı satış tablosunu ve BizimHesap Klonu status kaydını okur. Status yoksa satış kayıt zamanına göre yorum yapar.</div></div><script>const SU='https://iilfwosoroflzubkaryj.supabase.co';const SK='sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW';const db=supabase.createClient(SU,SK);const FIRMA='alayli';const fmt=n=>Number(n||0).toLocaleString('tr-TR');const money=n=>'TL '+Math.round(Number(n||0)).toLocaleString('tr-TR');const dt=v=>v?new Date(v).toLocaleString('tr-TR'):'veri yok';const iso=d=>d.toISOString().slice(0,10);function card(l,v,s,cls){return `<div class="card ${cls}"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`}function row(k,v){return `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`}async function dayRows(day){const {data,error}=await db.from('sales_raw').select('ciro,adet,tarih,created_at').eq('firma_id',FIRMA).eq('tarih',day).limit(50000);if(error)throw error;return data||[]}async function latestRows(){const {data,error}=await db.from('sales_raw').select('tarih,created_at').eq('firma_id',FIRMA).order('created_at',{ascending:false}).limit(1);if(error)throw error;return data&&data[0]?data[0]:null}async function latestClone(){try{const {data,error}=await db.from('bot_sync_status_latest').select('*').eq('company',FIRMA).eq('bot_name','bizimhesap_klonu').limit(1);if(error)return null;return data&&data[0]?data[0]:null}catch(e){return null}}function sum(rows){return rows.reduce((a,r)=>({ciro:a.ciro+Number(r.ciro||0),adet:a.adet+Number(r.adet||0)}),{ciro:0,adet:0})}async function loadAll(){const now=new Date(),today=iso(now),yd=new Date(now);yd.setDate(yd.getDate()-1);const yesterday=iso(yd);document.getElementById('cards').innerHTML=card('Durum','Yükleniyor','Canlı veri okunuyor','info');try{const [tr,yr,last,clone]=await Promise.all([dayRows(today),dayRows(yesterday),latestRows(),latestClone()]);const ts=sum(tr),ys=sum(yr);const lastCreated=last&&last.created_at?new Date(last.created_at):null;const cloneTime=clone&&clone.last_success_at?new Date(clone.last_success_at):(clone&&clone.finished_at?new Date(clone.finished_at):null);const baseTime=cloneTime||lastCreated;const ageMin=baseTime?Math.round((Date.now()-baseTime.getTime())/60000):999999;const statusCls=ageMin<=75?'ok':ageMin<=180?'warn':'bad';const statusTxt=ageMin<=75?'Güncel':ageMin<=180?'Kontrol':'Eski';document.getElementById('cards').innerHTML=card('Klon Senkronu',cloneTime?dt(cloneTime):'status yok',clone?`${clone.status||'-'} · ${clone.message||''}`:'sales_raw zamanına bakılıyor',clone&&clone.status==='failed'?'bad':statusCls)+card('Bugün Satış',money(ts.ciro),`${fmt(ts.adet)} adet · ${fmt(tr.length)} işlem`,tr.length?'ok':'warn')+card('Dün Satış',money(ys.ciro),`${fmt(ys.adet)} adet · ${fmt(yr.length)} işlem`,yr.length?'ok':'warn')+card('Son Satış Tarihi',last?last.tarih:'yok',lastCreated?dt(lastCreated):'sales_raw boş','info');document.getElementById('detail').innerHTML=row('Bugün tarihi',today)+row('Dün tarihi',yesterday)+row('Son klon senkronu',cloneTime?dt(cloneTime):'status bekleniyor')+row('Klon durumu',clone?clone.status:'status kaydı yok')+row('Klon mesajı',clone?clone.message||'-':'-')+row('Son veri kayıt zamanı',lastCreated?dt(lastCreated):'yok')+row('Son satış tarihi',last?last.tarih:'yok')+row('Bugün işlem',fmt(tr.length))+row('Dün işlem',fmt(yr.length))+row('Yorum',statusTxt==='Güncel'?'Veri güncel görünüyor':statusTxt==='Kontrol'?'Veri saati kontrol edilmeli':'Veri eski olabilir');}catch(e){document.getElementById('cards').innerHTML=card('Veri Okunamadı','Kontrol',e.message,'bad');document.getElementById('detail').innerHTML=row('Hata',e.message)}}loadAll();setInterval(loadAll,60000);</script></body></html>
