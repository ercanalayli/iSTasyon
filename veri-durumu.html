<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AperiON Veri Durumu</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F4F6FA;--card:#fff;--line:#E4E7EC;--text:#101828;--muted:#667085;--green:#059669;--red:#DC2626;--orange:#D97706;--blue:#1D4ED8;--shadow:0 12px 30px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text)}.wrap{max-width:1100px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.top h1{margin:0;font-size:24px}.top p{margin:4px 0 0;color:var(--muted);font-weight:750;font-size:13px}.btn{border:1px solid #B2CCFF;background:#EEF4FF;color:#1D4ED8;border-radius:12px;padding:10px 13px;text-decoration:none;font-weight:950;font-size:12px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:16px}.card .l{font-size:11px;color:var(--muted);font-weight:950;margin-bottom:8px}.card .v{font-size:24px;font-weight:950;color:var(--c,var(--blue))}.card .s{font-size:12px;color:var(--muted);font-weight:750;margin-top:8px}.wide{grid-column:1/-1}.ok{--c:var(--green)}.warn{--c:var(--orange)}.bad{--c:var(--red)}.info{--c:var(--blue)}.box{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);margin-top:12px;overflow:hidden}.hd{padding:14px 16px;border-bottom:1px solid var(--line);background:#FBFCFE;font-weight:950}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px}.row:last-child{border-bottom:0}.k{color:var(--muted);font-weight:850}.v{font-weight:950}.foot{margin-top:12px;color:var(--muted);font-size:12px;font-weight:750;line-height:1.5}@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.top{display:block}.top .btn{display:inline-block;margin-top:10px}}@media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1>AperiON Veri Durumu</h1><p>Bilgisayar botu, satış verisi ve bugün/dün kontrolü.</p></div><button class="btn" onclick="loadAll()">Yenile</button></div>
  <div class="grid" id="cards"></div>
  <div class="box"><div class="hd">Kontrol Detayı</div><div id="detail"></div></div>
  <div class="foot">Yeşil: güncel. Turuncu: kontrol gerekli. Kırmızı: veri eski veya bot çalışmamış olabilir.</div>
</div>
<script>
const SU='https://iilfwosoroflzubkaryj.supabase.co';
const SK='sb_publishable_MmvLmFVEDXXmGQS4xMCe0Q_MgDwftIW';
const db=supabase.createClient(SU,SK); const FIRMA='alayli';
const fmt=n=>Number(n||0).toLocaleString('tr-TR');
const dt=v=>v?new Date(v).toLocaleString('tr-TR'):'veri yok';
const iso=d=>d.toISOString().slice(0,10);
const money=n=>'TL '+Math.round(Number(n||0)).toLocaleString('tr-TR');
function card(l,v,s,cls){return `<div class="card ${cls}"><div class="l">${l}</div><div class="v">${v}</div><div class="s">${s}</div></div>`}
function row(k,v){return `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`}
async function countSales(day){const {count,error}=await db.from('sales_raw').select('id',{count:'exact',head:true}).eq('firma_id',FIRMA).eq('tarih',day); if(error) throw error; return count||0;}
async function sumSales(day){const {data,error}=await db.from('sales_raw').select('ciro,adet').eq('firma_id',FIRMA).eq('tarih',day).limit(50000); if(error) throw error; return (data||[]).reduce((a,r)=>({ciro:a.ciro+Number(r.ciro||0),adet:a.adet+Number(r.adet||0)}),{ciro:0,adet:0});}
async function loadAll(){
  const now=new Date(), today=iso(now), y=new Date(now); y.setDate(y.getDate()-1); const yesterday=iso(y);
  document.getElementById('cards').innerHTML=card('Durum','Yükleniyor','Kontrol ediliyor','info');
  try{
    const [tc,yc,ts,ys,lastRows,botRows]=await Promise.all([
      countSales(today), countSales(yesterday), sumSales(today), sumSales(yesterday),
      db.from('sales_raw').select('tarih,created_at').eq('firma_id',FIRMA).order('tarih',{ascending:false}).limit(1),
      db.from('bot_sync_status_latest').select('*').eq('company',FIRMA).eq('bot_name','bizimhesap').limit(1).catch(e=>({data:[],error:e}))
    ]);
    const lastSale=lastRows.data&&lastRows.data[0]?lastRows.data[0]:null;
    const bot=botRows.data&&botRows.data[0]?botRows.data[0]:null;
    const lastSuccess=bot&&bot.last_success_at?new Date(bot.last_success_at):null;
    const ageMin=lastSuccess?Math.round((Date.now()-lastSuccess.getTime())/60000):999999;
    const botCls=ageMin<=75?'ok':ageMin<=180?'warn':'bad';
    const todayCls=tc>0?'ok':'warn';
    const yCls=yc>0?'ok':'warn';
    document.getElementById('cards').innerHTML=
      card('Bot Son Başarı',lastSuccess?dt(lastSuccess):'yok',ageMin<999999?`${ageMin} dakika önce`:'bot status bekleniyor',botCls)+
      card('Bugün Satış',money(ts.ciro),`${fmt(ts.adet)} adet · ${fmt(tc)} işlem`,todayCls)+
      card('Dün Satış',money(ys.ciro),`${fmt(ys.adet)} adet · ${fmt(yc)} işlem`,yCls)+
      card('Son Satış Tarihi',lastSale?lastSale.tarih:'yok',lastSale?`kayıt oluşturma: ${dt(lastSale.created_at)}`:'sales_raw boş','info');
    document.getElementById('detail').innerHTML=
      row('Bugün tarihi',today)+row('Dün tarihi',yesterday)+row('Bot durumu',bot?bot.status:'status kaydı yok')+row('Bot mesajı',bot?bot.message||'-':'bot henüz status yazmamış')+row('Bot çektiği satır',bot?fmt(bot.rows_pulled):'0')+row('Son başarılı çekim',lastSuccess?dt(lastSuccess):'yok')+row('Veri yorumu',ageMin<=75?'Güncel':ageMin<=180?'Kontrol gerekli':'Bot/veri eski');
  }catch(e){
    document.getElementById('cards').innerHTML=card('Hata','Kontrol gerekli',e.message,'bad');
    document.getElementById('detail').innerHTML=row('Hata',e.message);
  }
}
loadAll(); setInterval(loadAll,60000);
</script>
</body></html>
