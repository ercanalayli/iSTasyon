<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>iSTasyon · Stok Kart</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080B0F;--s1:#0E1318;--s2:#131A22;--s3:#1A2330;
  --bd:rgba(100,180,255,0.07);--bd2:rgba(100,180,255,0.14);
  --tx:#E8F0F8;--tx2:#8AA4BF;--tx3:#445566;
  --ac:#3B82F6;--acl:rgba(59,130,246,0.12);
  --g:#10B981;--gl:rgba(16,185,129,0.1);
  --r:#EF4444;--rl:rgba(239,68,68,0.1);
  --a:#F59E0B;--al:rgba(245,158,11,0.1);
  --p:#8B5CF6;--pl:rgba(139,92,246,0.1);
  --rad:14px;
  --safe:env(safe-area-inset-top,20px);
  --safeb:env(safe-area-inset-bottom,16px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;max-width:440px;margin:0 auto;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(59,130,246,0.06),transparent),
             radial-gradient(ellipse 40% 40% at 10% 90%,rgba(139,92,246,0.04),transparent);}

/* HEADER */
.hdr{padding:calc(var(--safe)+10px) 18px 12px;flex-shrink:0;position:relative;z-index:10;
  background:rgba(8,11,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-back{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);
  display:grid;place-items:center;font-size:16px;cursor:pointer;flex-shrink:0;
  transition:all .15s;text-decoration:none;color:var(--tx);}
.hdr-back:active{transform:scale(.92)}
.hdr-ara{flex:1;display:flex;align-items:center;gap:8px;
  background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;padding:8px 12px;}
.hdr-ara input{flex:1;background:none;border:none;outline:none;color:var(--tx);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:600;}
.hdr-ara input::placeholder{color:var(--tx3)}

/* LİSTE */
.liste-ekran{flex:1;overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
.liste-ekran::-webkit-scrollbar{display:none}

.filtre-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filtre-bar::-webkit-scrollbar{display:none}
.filtre-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;
  background:var(--s2);border:1px solid var(--bd);
  font-size:10px;font-weight:700;color:var(--tx3);cursor:pointer;transition:all .15s;}
.filtre-chip.aktif{background:var(--acl);border-color:var(--ac);color:var(--ac)}

.stok-item{
  display:flex;align-items:center;gap:12px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);
  padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.stok-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--renk,var(--ac));border-radius:2px 0 0 2px;}
.stok-item:active{transform:scale(.98);background:var(--s2)}
.si-ikon{width:40px;height:40px;border-radius:11px;flex-shrink:0;
  display:grid;place-items:center;font-size:18px;background:var(--s3);}
.si-bilgi{flex:1;min-width:0}
.si-ad{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-alt{display:flex;gap:6px;align-items:center;margin-top:4px}
.si-tag{padding:2px 7px;border-radius:4px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.si-sag{text-align:right;flex-shrink:0}
.si-ciro{font-size:13px;font-weight:800;font-family:'DM Mono',monospace;color:var(--g)}
.si-stok{font-size:10px;margin-top:3px;font-weight:700;padding:2px 7px;border-radius:4px}
.stok-iyi{background:var(--gl);color:var(--g)}
.stok-az{background:var(--al);color:var(--a)}
.stok-kritik{background:var(--rl);color:var(--r)}

.stok-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:6px;overflow:hidden}
.stok-bar-ic{height:3px;border-radius:2px;transition:width .6s ease}

.bolum-bas{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.15em;margin:14px 0 8px 2px}

/* DETAY */
.detay-ekran{position:absolute;inset:0;background:var(--bg);z-index:20;
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.detay-ekran.aktif{transform:translateX(0)}

.detay-hdr{padding:calc(var(--safe)+10px) 18px 0;flex-shrink:0;
  background:rgba(8,11,15,0.95);backdrop-filter:blur(20px);}
.dh-row{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--bd);}
.dh-back{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--bd);
  display:grid;place-items:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.dh-back:active{transform:scale(.92)}
.dh-bilgi{flex:1;min-width:0}
.dh-ad{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh-alt{font-size:10px;color:var(--tx3);margin-top:2px;font-family:'DM Mono',monospace}

.tab-bar{display:flex;gap:0;padding:0 16px;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0;}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;font-size:10px;font-weight:800;color:var(--tx3);
  white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;
  transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Syne',sans-serif;}
.tab-btn.aktif{color:var(--ac);border-bottom-color:var(--ac)}

.detay-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 24px;-webkit-overflow-scrolling:touch;}
.detay-scroll::-webkit-scrollbar{display:none}

.sekme{display:none}
.sekme.aktif{display:block}

/* KARTLAR */
.kart{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);
  padding:14px;margin-bottom:10px;}
.kart-bas{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;
  letter-spacing:.12em;margin-bottom:10px}

/* ÖZET BANNER */
.ozet-banner{background:linear-gradient(135deg,var(--s2),var(--s3));
  border:1px solid var(--bd2);border-radius:var(--rad);padding:16px;margin-bottom:10px;
  position:relative;overflow:hidden;}
.ob-bg{position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-size:80px;opacity:.04;pointer-events:none;}
.ob-ikon{font-size:28px;margin-bottom:6px}
.ob-ad{font-size:18px;font-weight:800;line-height:1.2;margin-bottom:2px}
.ob-kod{font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:10px}
.ob-kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ob-k{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 10px;}
.ob-k .lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.ob-k .val{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;margin-top:3px}

/* STOK METRE */
.stok-metre{margin-bottom:10px}
.sm-row{display:flex;justify-content:space-between;margin-bottom:6px}
.sm-lbl{font-size:11px;font-weight:700}
.sm-val{font-size:11px;font-family:'DM Mono',monospace;font-weight:700}
.sm-bar{height:10px;background:var(--s3);border-radius:5px;overflow:hidden;margin-bottom:4px}
.sm-bar-ic{height:10px;border-radius:5px;transition:width .8s ease}
.sm-kritik-cizgi{position:relative;height:0}
.sm-kritik-cizgi::after{content:'KRİTİK';position:absolute;top:-18px;
  font-size:7px;font-weight:800;color:var(--r);letter-spacing:.06em;}

/* AYLIK TABLO */
.aylik-tablo{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);overflow:hidden;margin-bottom:10px;}
.at-bas{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;
  padding:7px 12px;border-bottom:1px solid var(--bd);background:var(--s2);}
.at-hdr{font-size:8px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.at-hdr:first-child{text-align:left}
.at-satir{display:grid;grid-template-columns:60px 1fr 1fr 1fr 1fr;
  padding:9px 12px;border-bottom:1px solid var(--bd);}
.at-satir:last-child{border-bottom:none}
.at-satir.vurgu{background:var(--acl)}
.at-h{font-size:11px;font-weight:600;text-align:right;font-family:'DM Mono',monospace}
.at-h:first-child{text-align:left;font-family:'Syne',sans-serif;color:var(--tx2);font-size:10px}
.at-h.yesil{color:var(--g)}
.at-h.mor{color:var(--p)}

/* ALİŞ GEÇMİŞİ */
.alis-satir{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);}
.alis-satir:last-child{border-bottom:none}
.as-tarih{font-size:10px;font-family:'DM Mono',monospace;color:var(--tx3);flex-shrink:0;width:80px}
.as-bilgi{flex:1}
.as-tedarikci{font-size:12px;font-weight:700}
.as-adet{font-size:10px;color:var(--tx3);margin-top:2px}
.as-fiyat{text-align:right;flex-shrink:0}
.as-birim{font-size:14px;font-weight:800;font-family:'DM Mono',monospace;color:var(--p)}
.as-toplam{font-size:10px;color:var(--tx3);margin-top:2px}

/* CARİ SIRALA */
.cari-satir{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);}
.cari-satir:last-child{border-bottom:none}
.cs-sira{width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:grid;place-items:center;font-size:9px;font-weight:800;background:var(--s2);color:var(--tx3);}
.cs-sira.bir{background:var(--al);color:var(--a)}
.cs-bilgi{flex:1;min-width:0}
.cs-ad{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cs-alt{font-size:10px;color:var(--tx3);margin-top:2px}
.cs-sag{text-align:right;flex-shrink:0}
.cs-adet{font-size:13px;font-weight:800;font-family:'DM Mono',monospace}
.cs-ciro{font-size:10px;color:var(--tx3);margin-top:2px}
.cs-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:5px}
.cs-bar-ic{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--ac),var(--p));transition:width .7s ease}

/* KARŞILAŞTIRMA */
.kars-row{display:flex;justify-content:space-between;margin-bottom:4px}
.kars-bar-wrap{height:8px;background:var(--s3);border-radius:4px;position:relative;overflow:hidden;margin-bottom:10px}
.kars-bar{height:8px;border-radius:4px;position:absolute;top:0;left:0;transition:width .7s ease}
</style>
</head>

// ── YARDIMCILAR ──────────────────────────────────────────────────────────────
function para(n){if(!n&&n!==0)return'—';if(n>=1000000)return'₺'+(n/1e6).toFixed(1)+'M';if(n>=1000)return'₺'+Math.round(n/1000)+'K';return'₺'+Math.round(n).toLocaleString('tr-TR');}
function stokDurum(s){const yuzde=s.mevcut/s.max*100;return yuzde<(s.min/s.max*100)?'KRİTİK':yuzde<30?'AZ':'NORMAL';}
function stokRenk(d){return d==='NORMAL'?'var(--g)':d==='AZ'?'var(--a)':'var(--r)';}
function stokBg(d){return d==='NORMAL'?'var(--gl)':d==='AZ'?'var(--al)':'var(--rl)';}
function stokSinif(d){return d==='NORMAL'?'stok-iyi':d==='AZ'?'stok-az':'stok-kritik';}

let aktifKategori='Tümü';
let aktifStok=null;

// ── LİSTE ────────────────────────────────────────────────────────────────────
function renderListe(liste){
  document.getElementById('stokListesi').innerHTML = liste.map(s=>{
    const durum=stokDurum(s.stok);
    const yuzde=Math.min(100,Math.round(s.stok.mevcut/s.stok.max*100));
    const barRenk=durum==='NORMAL'?'var(--g)':durum==='AZ'?'var(--a)':'var(--r)';
    return`<div class="stok-item" style="--renk:${s.renk}" onclick="stokAc('${s.id}')">
      <div class="si-ikon">${s.ikon}</div>
      <div class="si-bilgi">
        <div class="si-ad">${s.ad}</div>
        <div class="si-alt">
          <span class="si-tag" style="background:${s.renk}22;color:${s.renk}">${s.kategori}</span>
          <span style="font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace">${s.kod}</span>
        </div>
        <div class="stok-bar">
          <div class="stok-bar-ic" style="width:${yuzde}%;background:${barRenk}"></div>
        </div>
      </div>
      <div class="si-sag">
        <div class="si-ciro">${para(s.ozet.bu_yil_ciro)}</div>
        <div class="si-stok ${stokSinif(durum)}">${s.stok.mevcut} ${s.stok.birim}</div>
      </div>
    </div>`;
  }).join('');
}

function stokFiltrele(q){
  const liste = STOKLAR.filter(s=>{
    const katOk = aktifKategori==='Tümü' || s.kategori===aktifKategori;
    const araOk = !q || s.ad.toLowerCase().includes(q.toLowerCase()) || s.kod.toLowerCase().includes(q.toLowerCase());
    return katOk && araOk;
  });
  renderListe(liste);
}

function kategoriSec(kat, el){
  aktifKategori=kat;
  document.querySelectorAll('.filtre-chip').forEach(c=>c.classList.remove('aktif'));
  el.classList.add('aktif');
  stokFiltrele(document.getElementById('araInput').value);
}

// ── DETAY ────────────────────────────────────────────────────────────────────
function stokAc(id){
  aktifStok=STOKLAR.find(s=>s.id===id);
  if(!aktifStok) return;
  const s=aktifStok;
  const durum=stokDurum(s.stok);

  document.getElementById('dhAd').textContent=s.ad;
  document.getElementById('dhAlt').textContent=`${s.kod} · ${s.stok.mevcut} ${s.stok.birim}`;
  document.getElementById('dhStok').textContent=durum;
  document.getElementById('dhStok').style.background=stokBg(durum);
  document.getElementById('dhStok').style.color=stokRenk(durum);

  renderOzet(s);
  renderAylik(s);
  renderAlis(s);
  renderCariler(s);
  renderKarsilastirma(s);

  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('aktif',i===0));
  document.querySelectorAll('.sekme').forEach((s,i)=>s.classList.toggle('aktif',i===0));
  document.getElementById('detayScroll').scrollTop=0;
  document.getElementById('detayEkran').classList.add('aktif');
}

function geriGit(){
  document.getElementById('detayEkran').classList.remove('aktif');
}

function sekme(id,btn){
  document.querySelectorAll('.sekme').forEach(s=>s.classList.remove('aktif'));
  document.getElementById('t-'+id).classList.add('aktif');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  document.getElementById('detayScroll').scrollTop=0;
}

        <div class="sm-lbl" style="color:${stokRenk(durum)}">${durum} · ${st.mevcut} ${st.birim}</div>

          ${maliyet_deg<=0?'▼':'▲'}%${Math.abs(maliyet_deg)}
        </div>
        <div style="font-size:9px;color:var(--tx3);margin-top:4px">G.yıl: ₺${o.gecen_yil_ort_alis}</div>

    </div>`;
}

// ── CARİLER ─────────────────────────────────────────────────────────────────
function renderCariler(s){
  const maxAdet=Math.max(...s.cariler.map(c=>c.bu_yil));
  document.getElementById('t-cariler').innerHTML=`
    <div class="bolum-bas">En Çok Alan Cariler (Bu Yıl)</div>
    <div style="background:var(--s1);border:1px solid var(--bd);border-radius:var(--rad);overflow:hidden">
      ${s.cariler.map((c,i)=>`
        <div class="cari-satir">
          <div class="cs-sira ${i===0?'bir'}">${i+1}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
              <div class="cs-bilgi">
                <div class="cs-ad">${c.ad}</div>
                <div class="cs-alt">G.Yıl: ${c.gecen_yil.toLocaleString('tr-TR')} adet</div>
              </div>
              <div class="cs-sag">
                <div class="cs-adet">${c.bu_yil.toLocaleString('tr-TR')}</div>
                <div class="cs-ciro">${para(c.ciro)}</div>
              </div>
            </div>
            <div class="cs-bar">
              <div class="cs-bar-ic cari-bar-ic" data-w="${Math.round(c.bu_yil/maxAdet*100)}" style="width:0%"></div>
            </div>
          </div>
        </div>`).join('')}
    </div>`;

  setTimeout(()=>{
    document.querySelectorAll('.cari-bar-ic').forEach(el=>{
      el.style.width=el.dataset.w+'%';
    });
  },100);
}

// ── KARŞILAŞTIRMA ─────────────────────────────────────────────────────────────
function renderKarsilastirma(s){
  const o=s.ozet;
  const maxC=Math.max(o.bu_yil_ciro,o.gecen_yil_ciro);
  const maxA=Math.max(o.bu_yil_adet,o.gecen_yil_adet);

  document.getElementById('t-karsilastirma').innerHTML=`
    <div class="kart">
      <div class="kart-bas">Yıllık Ciro</div>
      <div style="margin-bottom:8px">
        <div class="kars-row"><span style="font-size:11px;font-weight:700;color:var(--ac)">Bu Yıl</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--ac)">${para(o.bu_yil_ciro)}</span></div>
        <div class="kars-bar-wrap"><div class="kars-bar" id="cByBar" style="width:0%;background:var(--ac)"></div></div>
      </div>
      <div>
        <div class="kars-row"><span style="font-size:11px;font-weight:700;color:var(--tx3)">Geçen Yıl</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3)">${para(o.gecen_yil_ciro)}</span></div>
        <div class="kars-bar-wrap"><div class="kars-bar" id="cGyBar" style="width:0%;background:var(--tx3);opacity:.5"></div></div>
      </div>
    </div>

    <div class="kart">
      <div class="kart-bas">Yıllık Adet</div>
      <div style="margin-bottom:8px">
        <div class="kars-row"><span style="font-size:11px;font-weight:700;color:var(--g)">Bu Yıl</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--g)">${o.bu_yil_adet.toLocaleString('tr-TR')}</span></div>
        <div class="kars-bar-wrap"><div class="kars-bar" id="aByBar" style="width:0%;background:var(--g)"></div></div>
      </div>
      <div>
        <div class="kars-row"><span style="font-size:11px;font-weight:700;color:var(--tx3)">Geçen Yıl</span><span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--tx3)">${o.gecen_yil_adet.toLocaleString('tr-TR')}</span></div>
        <div class="kars-bar-wrap"><div class="kars-bar" id="aGyBar" style="width:0%;background:var(--tx3);opacity:.5"></div></div>
      </div>
    </div>

    <div class="kart">
      <div class="kart-bas">Alış Fiyatı Trendi</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:9px;color:var(--tx3);margin-bottom:2px">Bu Yıl Ort.</div>
          <div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--p)">₺${o.bu_yil_ort_alis}</div>
        </div>
        <div style="font-size:24px;color:var(--tx3)">→</div>
        <div style="text-align:right">
          <div style="font-size:9px;color:var(--tx3);margin-bottom:2px">Geçen Yıl</div>
          <div style="font-size:20px;font-weight:800;font-family:'DM Mono',monospace;color:var(--tx2)">₺${o.gecen_yil_ort_alis}</div>
        </div>
      </div>
      <div style="margin-top:10px;padding:8px;background:var(--s2);border-radius:8px;text-align:center">
        <span style="font-size:12px;font-weight:700;color:${o.bu_yil_ort_alis<=o.gecen_yil_ort_alis?'var(--g)':'var(--r)'}">
          ${o.bu_yil_ort_alis<=o.gecen_yil_ort_alis?'▼ Maliyet düştü':'▲ Maliyet arttı'}
          %${Math.abs(Math.round((o.bu_yil_ort_alis-o.gecen_yil_ort_alis)/o.gecen_yil_ort_alis*100))}
        </span>
      </div>
    </div>

    <div class="bolum-bas">Aylık Karşılaştırma</div>
    <div class="aylik-tablo">
      <div class="at-bas" style="grid-template-columns:60px 1fr 1fr 1fr">
        <div class="at-hdr">Ay</div>
        <div class="at-hdr">Bu Yıl</div>
        <div class="at-hdr">G. Yıl</div>
        <div class="at-hdr">Fark</div>
      </div>
      ${s.aylik.filter(a=>a.ciro>0||a.gecen_yil_ciro>0).map(a=>{
        const fark=a.ciro-a.gecen_yil_ciro;
        return`<div class="at-satir" style="grid-template-columns:60px 1fr 1fr 1fr">
          <div class="at-h">${a.ay}</div>
          <div class="at-h ${a.ciro>0?'yesil':''}">${a.ciro>0?para(a.ciro):'—'}</div>
          <div class="at-h" style="color:var(--tx3)">${para(a.gecen_yil_ciro)}</div>
          <div class="at-h" style="color:${fark>=0?'var(--g)':'var(--r)'}">${fark>=0?'+':''}${para(fark)}</div>
        </div>`;
      }).join('')}
    </div>`;

  setTimeout(()=>{
    const set=(id,w)=>{const el=document.getElementById(id);if(el)el.style.width=w+'%';};
    set('cByBar',Math.round(o.bu_yil_ciro/maxC*100));
    set('cGyBar',Math.round(o.gecen_yil_ciro/maxC*100));
    set('aByBar',Math.round(o.bu_yil_adet/maxA*100));
    set('aGyBar',Math.round(o.gecen_yil_adet/maxA*100));
  },100);
}

// ── BAŞLAT ────────────────────────────────────────────────────────────────────
renderListe(STOKLAR);

const sesyon=oturumAl();
</script>
</body>
</html>
